name: Update head-of-park flow
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch USBR and compute head-of-park
        run: |
          curl -s 'https://www.usbr.gov/pn-bin/v1/instant.pl?list=beno,ceno,arno&back=8&format=csv' -o usbr.csv
          python3 - << 'PY'
          import csv, json, datetime, zoneinfo, re
          PT = zoneinfo.ZoneInfo('America/Los_Angeles')
          REACH_LOSS = 101.5  # calibrated Benham Falls -> head-of-park channel loss (cfs)
          def num(s):
              m = re.match(r'\s*(-?\d+(?:\.\d+)?)', s or '')
              return float(m.group(1)) if m else None
          rows = list(csv.reader(open('usbr.csv')))
          hdr = [h.strip().lower() for h in rows[0]]
          def col(*names):
              for n in names:
                  if n in hdr: return hdr.index(n)
              return -1
          bi, ci, ai = col('beno_q','beno_qr'), col('ceno_qc','ceno_q'), col('arno_qc','arno_q')
          ti = col('beno_wf','beno_wk','beno_wt')   # water temperature column, if the station carries one
          assert min(bi,ci,ai) > 0, 'flow columns not found: '+','.join(hdr)
          out = []; temp_c = None
          for r in rows[1:]:
              if len(r) <= max(bi,ci,ai): continue
              ds = r[0].strip(); t = None
              for fmt in ('%Y-%m-%d %H:%M','%Y-%m-%dT%H:%M','%m/%d/%Y %H:%M'):
                  try:
                      t = datetime.datetime.strptime(ds, fmt).replace(tzinfo=PT); break
                  except ValueError: pass
              if t is None: continue
              b, c, a = num(r[bi]), num(r[ci]), num(r[ai])
              if None in (b,c,a) or min(b,c,a) < -900: continue
              out.append([int(t.timestamp()*1000), round(max(0.0, b-c-a-REACH_LOSS), 1)])
              if ti > 0 and len(r) > ti:
                  w = num(r[ti])
                  if w is not None and -900 < w:
                      # unit heuristic: liquid water can't be 12 F or 45 C in the Deschutes
                      if 0 < w < 32: temp_c = round(w, 1)          # already Celsius
                      elif 32 <= w < 90: temp_c = round((w-32)*5/9, 1)  # Fahrenheit
          out.sort()
          doc = {'updated': datetime.datetime.now(datetime.timezone.utc).isoformat(),
                 'series': out[-800:]}
          if temp_c is not None: doc['temp_c'] = temp_c
          json.dump(doc, open('head.json','w'))
          print('head-of-park points:', len(out), '| latest:', out[-1] if out else None, '| water temp C:', temp_c)
          PY
      - name: Commit
        run: |
          git config user.name 'flowstate-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add head.json
          git diff --cached --quiet || git commit -m 'Update head-of-park flow data'
          git push
