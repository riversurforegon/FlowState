   const media=m.kind==='video'
     ?`<video src="${u}" muted playsinline preload="metadata" style="width:110px;height:110px;object-fit:cover;border:1px solid var(--steel)"></video>`
     :`<img src="${u}" loading="lazy" style="width:110px;height:110px;object-fit:cover;border:1px solid var(--steel)">`;
   return `<a href="${u}" target="_blank" rel="noopener" style="flex:none;text-decoration:none;position:relative">
    ${media}
    <div style="position:absolute;left:0;right:0;bottom:0;background:rgba(20,26,24,.82);padding:3px 5px">
      <div class="tiny" style="color:#C9E3B8">${m.verified?'\u2713 ':''}${esc(m.flow_txt||'')}</div>
      <div class="tiny">${esc(m.surfer)} \u00B7 ${timeAgo(new Date(m.created_at).getTime())}</div>
    </div></a>`; }).join('');
 }catch(e){ el.innerHTML='<span class="tiny">Could not load media.</span>'; } }
function fkMediaPick(id){ const w=WAVES[id]; if(!w) return;
 if(!state.profile||!state.profile.email){ toast('Sign in (Profile) to upload flow proof'); return; }
 if(w.lat==null){ toast('This wave has no verified location yet \u2014 uploads disabled'); return; }
 const inp=$('#fkMediaFile'); if(!inp) return;
 inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(f) fkMediaUpload(id,f); inp.value=''; };
 inp.click(); }
function fkMediaShrink(file){ return new Promise(res=>{
 if(!file.type.startsWith('image/')){ res(file); return; }
 const img=new Image(); const url=URL.createObjectURL(file);
 img.onload=()=>{ const s=Math.min(1,1600/Math.max(img.width,img.height));
   if(s>=1&&file.size<2500000){ URL.revokeObjectURL(url); res(file); return; }
   const c=document.createElement('canvas'); c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
   c.getContext('2d').drawImage(img,0,0,c.width,c.height);
   c.toBlob(b=>{ URL.revokeObjectURL(url); res(b||file); },'image/jpeg',0.82); };
 img.onerror=()=>{ URL.revokeObjectURL(url); res(file); };
 img.src=url; }); }
async function fkMediaUpload(id,file){ const w=WAVES[id];
 const isVideo=file.type.startsWith('video/');
 if(isVideo&&file.size>50*1024*1024){ toast('Video too big \u2014 keep it under 50 MB'); return; }
 toast('Verifying you\u2019re at the wave\u2026');
 fkGeo(async p=>{
  const d=fkNearest(w,p.coords.latitude,p.coords.longitude);
  if(d>FK_VERIFY_KM){ toast('Too far out \u2014 flow proof must be shot within 1 mile of the wave ('+(d<100?d.toFixed(1):Math.round(d))+' km away)'); return; }
  toast('Uploading\u2026');
  try{
   const blob=await fkMediaShrink(file);
   const ext=isVideo?(file.name.match(/\.(mp4|mov|webm)$/i)?RegExp.$1.toLowerCase():'mp4'):'jpg';
   const path='w'+id+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.'+ext;
   const up=await fetch(SB_URL+'/storage/v1/object/wave-media/'+path,{method:'POST',
    headers:{apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':blob.type||file.type,'x-upsert':'false'},body:blob});
   if(!up.ok) throw new Error('storage '+up.status);
   const lv=w.gid?state.live[w.gid]:null;
   const flow_txt=lv&&lv.flow!=null?fmtFlow(lv.flow):(lv&&lv.stage!=null?lv.stage+' ft':null);
   await fetch(SB_URL+'/rest/v1/media',{method:'POST',
    headers:{apikey:SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify({wave_id:id,email:state.profile.email,kind:isVideo?'video':'image',
     path,flow_txt,verified:true,dist_km:Math.round(d*100)/100})});
   fkLog('media_upload','sheet',id,{kind:isVideo?'video':'image'});
   toast('\u2713 Flow proof logged \u2014 '+(flow_txt||'no gauge reading')+' on record');
   fkMediaLoad(id);
  }catch(e){ toast('Upload failed \u2014 try again ('+e.message+')'); }
 }); }


/* ---- hardened geolocation ---- */
function fkGeo(cb,optMsg){ if(!navigator.geolocation){ toast('GPS unavailable on this device/browser'); return; }
 navigator.geolocation.getCurrentPosition(p=>cb(p),err=>{
  const m=(err&&err.code===1)?'Location denied \u2014 iPhone: Settings \u2192 Privacy & Security \u2192 Location Services \u2192 Safari Websites \u2192 While Using; and Safari aA menu \u2192 Website Settings \u2192 Location \u2192 Allow'
   :(err&&err.code===2)?'No GPS signal \u2014 step outside or away from cover and retry'
   :'GPS timed out \u2014 open sky helps; try again';
  toast(optMsg||m); },{enableHighAccuracy:true,timeout:15000,maximumAge:20000}); }
async function fkGeoTest(){ let st='unknown';
 try{ if(navigator.permissions&&navigator.permissions.query){ st=(await navigator.permissions.query({name:'geolocation'})).state; } }catch(e){}
 if(st==='denied'){ toast('Location is BLOCKED at the iOS level \u2014 Settings \u2192 Privacy & Security \u2192 Location Services \u2192 Safari Websites \u2192 While Using. Then in Safari on this site: aA menu \u2192 Website Settings \u2192 Location \u2192 Allow.'); return; }
 toast('Testing GPS (permission: '+st+')\u2026');
 fkGeo(p=>{ toast('\u2713 GPS OK \u2014 fix within \u00B1'+Math.round(p.coords.accuracy)+' m'+(p.coords.accuracy>200?' \u2014 enable Precise Location for reliable check-ins':'')); state.geo={lat:p.coords.latitude,lon:p.coords.longitude}; }); }

/* ---- crew QR connect ---- */
function fkEnsureQR(cb){ if(window.QRCode){cb();return;}
 const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
 s.onload=cb; s.onerror=()=>toast('QR library unavailable offline'); document.head.appendChild(s); }
function fkCrewQRCard(){ if(!state.profile) return '';
 return `<div class="card fadein"><h3 style="margin-bottom:6px">\uD83D\uDD17 Crew Link</h3>
  <div class="sub">Have another surfer scan this with their phone camera \u2014 it opens FlowState and adds you to their crew. Two scans, two crews, one lineup.</div>
  <div id="fkQR" style="display:flex;justify-content:center;padding:14px 0"></div>
  <div class="tiny" style="text-align:center">${esc(state.profile.name)} \u00B7 ${esc(state.profile.email)}</div></div>`; }
function fkQRDraw(){ const el=document.getElementById('fkQR'); if(!el||!state.profile||el.childNodes.length) return;
 fkEnsureQR(()=>{ try{ new QRCode(el,{text:'https://flowstatesurf.org/?crew='+encodeURIComponent(state.profile.email)+'&cn='+encodeURIComponent(state.profile.name||''),
  width:180,height:180,colorDark:'#1E2624',colorLight:'#D8CBAA',correctLevel:QRCode.CorrectLevel.M}); }catch(e){} }); }
function fkCrewParam(){ try{ const q=new URLSearchParams(location.search);
 const em=(q.get('crew')||'').trim().toLowerCase(); if(!em) return;
 history.replaceState(null,'',location.pathname);
 if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) return;
 const nm=(q.get('cn')||em.split('@')[0]).slice(0,40);
 if(state.profile&&state.profile.email===em){ toast('That\u2019s your own crew link \uD83E\uDD19'); return; }
 if((state.crew||[]).some(c=>c.email===em)){ toast(nm+' is already in your crew'); return; }
 if(confirm('Add '+nm+' ('+em+') to your crew?')){
   state.crew.push({name:nm,email:em}); persist(); render();
   toast('\uD83E\uDD1D '+nm+' joined your crew \u2014 via con dios');
   fkLog('crew_add','qr'); fkMissionCheck(); } }catch(e){} }


/* ---- direct messages + call up the crew ---- */
const FK_TPL=["Heading down to the wave, come sesh!","Headed for a sunset sesh!","Dawn Patrol tomorrow!?"];
async function fkDM(body){ try{ const r=await fetch(SB_URL+'/functions/v1/dm',{method:'POST',
 headers:{'Content-Type':'application/json','apikey':SB_KEY},
 body:JSON.stringify(Object.assign({email:state.profile?state.profile.email:null},body))});
 return await r.json(); }catch(e){ return null; } }
function fkPeerName(em){ const c=(state.crew||[]).find(c=>c.email===em); return c?c.name:em.split('@')[0]; }
async function fkDMPoll(){ if(!state.profile) return;
 const r=await fkDM({action:'unread'}); if(!r) return;
 const prev=state.dmUnread||0; state.dmUnread=r.n||0;
 if(state.dmUnread>prev){ toast('\uD83D\uDCAC New message \u2014 check your Profile inbox'); if(state.tab==='profile') render(); } }
function fkTplChips(taId){ return `<div class="moodrow">${FK_TPL.map((t,i)=>
 `<button class="mood" onclick="document.getElementById('${taId}').value=FK_TPL[${i}]">${esc(t)}</button>`).join('')}</div>`; }
function fkCallUp(id){ const w=WAVES[id]; if(!w) return;
 if(!state.profile){ toast('Sign in (Profile) to call up the crew'); return; }
 if(!(state.crew||[]).length){ toast('No crew yet \u2014 add surfers on your Profile (or share your Crew QR)'); go('profile'); return; }
 fkLog('crew_callup','sheet',id);
 const panel=$('#sheetPanel'); if(!panel) return;
 panel.innerHTML=`<div class="grab"></div><div class="sheet-body" style="padding-bottom:26px">
  <h3 style="margin:14px 0 4px">\uD83D\uDCE3 Call up the crew \u2014 ${esc(w.name)}</h3>
  <div class="sub" style="margin-bottom:10px">Pick your people, pick your words. Message lands in their FlowState inbox.</div>
  ${(state.crew||[]).map((c,i)=>`<label class="kv" style="cursor:pointer"><span class="k">
    <input type="checkbox" class="fkCU" data-em="${esc(c.email)}" checked style="width:auto;margin-right:8px">${esc(c.name)}</span>
    <span class="v tiny">${esc(c.email)}</span></label>`).join('')}
  ${fkTplChips('fkCUmsg')}
  <textarea id="fkCUmsg" rows="2" placeholder="Custom message\u2026" style="margin-top:6px">${esc(FK_TPL[0])}</textarea>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn btn-forest" onclick="fkCallUpSend(${id})">Send it \uD83E\uDD19</button>
    <button class="btn btn-ghost" onclick="closeSheet()">Cancel</button></div></div>`;
 $('#sheet').classList.add('open'); }
async function fkCallUpSend(id){ const w=WAVES[id];
 const msg=($('#fkCUmsg').value||'').trim()||FK_TPL[0];
 const to=[...document.querySelectorAll('.fkCU')].filter(x=>x.checked).map(x=>x.dataset.em);
 if(!to.length){ toast('Pick at least one crew member'); return; }
 toast('Sending\u2026'); let sent=0, offApp=[];
 for(const em of to){ const r=await fkDM({action:'send',to:em,body:msg+' \u00B7 '+w.name,wave:id});
   if(r&&r.ok) sent++; else if(r&&r.reason==='not a member') offApp.push(em); }
 closeSheet();
 if(offApp.length){ const s=encodeURIComponent('FlowState \u2014 '+w.name); const b=encodeURIComponent(msg+' \u00B7 '+w.name+' \u00B7 https://flowstatesurf.org');
   toast(sent+' sent \u00B7 '+offApp.length+' not on FlowState \u2014 opening email'); 
   setTimeout(()=>{ location.href='mailto:'+offApp.join(',')+'?subject='+s+'&body='+b; },1200); }
 else toast('\uD83D\uDCE3 Sent to '+sent+' crew member'+(sent===1?'':'s')+' \u2014 via con dios');
 fkLog('dm_send','sheet',id,{n:sent}); }
let fkThreadTimer=null;
function fkThreadIdx(i){ const c=(state.crew||[])[i]; if(c) fkThread(c.email,c.name); }
async function fkThread(peer,name){ if(!state.profile){ toast('Sign in (Profile) to message'); return; }
 const panel=$('#sheetPanel'); if(!panel) return;
 panel.innerHTML=`<div class="grab"></div><div class="sheet-body" style="padding-bottom:26px">
  <h3 style="margin:14px 0 4px">\uD83D\uDCAC ${esc(name||fkPeerName(peer))}</h3>
  <div id="fkThreadBox" style="max-height:44vh;overflow-y:auto;margin:10px 0;display:flex;flex-direction:column;gap:6px"><span class="tiny">loading\u2026</span></div>
  ${fkTplChips('fkDMmsg')}
  <textarea id="fkDMmsg" rows="2" placeholder="Message\u2026" style="margin-top:6px"></textarea>
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn btn-forest" onclick="fkThreadSend('${peer}')">Send</button>
    <button class="btn btn-ghost" onclick="closeSheet()">Close</button></div></div>`;
 $('#sheet').classList.add('open');
 await fkThreadLoad(peer);
 if(fkThreadTimer) clearInterval(fkThreadTimer);
 fkThreadTimer=setInterval(()=>{ if(document.getElementById('fkThreadBox')) fkThreadLoad(peer,true); else { clearInterval(fkThreadTimer); fkThreadTimer=null; } },20000); }
async function fkThreadLoad(peer,quiet){ const box=document.getElementById('fkThreadBox'); if(!box) return;
 const r=await fkDM({action:'inbox'}); if(!r||!Array.isArray(r.messages)){ if(!quiet) box.innerHTML='<span class="tiny">Could not load.</span>'; return; }
 const me=state.profile.email;
 const th=r.messages.filter(m=>m.from_email===peer||m.to_email===peer).reverse();
 state.dmCache=r.messages;
 box.innerHTML=th.length?th.map(m=>{ const mine=m.from_email===me;
  return `<div style="align-self:${mine?'flex-end':'flex-start'};max-width:82%;padding:8px 11px;border:1px solid ${mine?'#7E9A6E':'var(--steel)'};background:${mine?'#3d5741':'var(--panel2)'};font-size:12.5px;line-height:1.5">${esc(m.body)}<div class="tiny" style="margin-top:3px">${timeAgo(new Date(m.created_at).getTime())}</div></div>`;}).join('')
  :'<span class="tiny">No messages yet \u2014 start the stoke.</span>';
 box.scrollTop=box.scrollHeight;
 fkDM({action:'read',peer}).then(()=>{ state.dmUnread=null; fkDMPoll(); }); }
async function fkThreadSend(peer){ const ta=document.getElementById('fkDMmsg');
 const msg=(ta.value||'').trim(); if(!msg) return; ta.value='';
 const r=await fkDM({action:'send',to:peer,body:msg});
 if(r&&r.ok){ fkThreadLoad(peer,true); fkLog('dm_send','profile'); }
 else toast(r&&r.reason==='not a member'?'They have not signed into FlowState yet \u2014 send them your Crew QR':'Send failed \u2014 try again'); }
function fkInboxCard(){ if(!state.profile) return '';
 const msgs=state.dmCache||[]; const me=state.profile.email; const peers={};
 msgs.forEach(m=>{ const p=m.from_email===me?m.to_email:m.from_email;
  if(!peers[p]) peers[p]={last:m,unread:0};
  if(m.to_email===me&&!m.read) peers[p].unread++; });
 const list=Object.entries(peers).sort((a,b)=>new Date(b[1].last.created_at)-new Date(a[1].last.created_at)).slice(0,8);
 return `<div class="card fadein"><h3 style="margin-bottom:6px">\uD83D\uDCAC Messages${state.dmUnread?` \u00B7 <span style="color:var(--brass-l)">${state.dmUnread} new</span>`:''}</h3>
  <div class="sub">Direct lines to your crew \u2014 lives inside FlowState, checked while the app is open.</div>
  ${list.length?`<div style="margin-top:8px">${list.map(([p,v])=>`<div class="kv" style="cursor:pointer" onclick="fkThread('${p}')"><span class="k">${v.unread?'\uD83D\uDD35 ':''}${esc(fkPeerName(p))}</span><span class="v tiny">${esc(v.last.body.slice(0,44))}${v.last.body.length>44?'\u2026':''}</span></div>`).join('')}</div>`
  :'<div class="tiny" style="margin-top:8px">No conversations yet \u2014 message a crew member below, or Call Up the Crew from any wave card.</div>'}
 </div>`; }


/* ---- swipe-down-to-close (grab-bar zone, all sheets) ---- */
(function(){ const panel=document.getElementById('sheetPanel'); if(!panel) return;
 let sy=null, dy=0;
 panel.addEventListener('touchstart',e=>{ 
   const top=panel.getBoundingClientRect().top;
   if(e.touches[0].clientY-top<=52){ sy=e.touches[0].clientY; dy=0; panel.style.transition='none'; }
   else sy=null; },{passive:true});
 panel.addEventListener('touchmove',e=>{ if(sy==null) return;
   dy=e.touches[0].clientY-sy; if(dy<0) dy=0;
   panel.style.transform='translateY('+dy+'px)'; },{passive:true});
 panel.addEventListener('touchend',()=>{ if(sy==null) return;
   panel.style.transition='';
   if(dy>90){ panel.style.transform=''; closeSheet(); }
   else panel.style.transform='';
   sy=null; dy=0; },{passive:true});
})();

/* ---- Google sign-in (Supabase Auth) ---- */
function fkGoogle(){ fkLog('tap','google_signin');
 location.href=SB_URL+'/auth/v1/authorize?provider=google&redirect_to='+encodeURIComponent(location.origin+location.pathname); }
function fkAuthHash(){ try{
 if(!location.hash||location.hash.indexOf('access_token=')<0){
   if(location.hash&&location.hash.indexOf('error')>=0){ const q=new URLSearchParams(location.hash.slice(1));
     toast('Google sign-in: '+(q.get('error_description')||q.get('error')||'failed').replace(/\+/g,' '));
     history.replaceState(null,'',location.pathname); }
   return; }
 const q=new URLSearchParams(location.hash.slice(1));
 const at=q.get('access_token'); history.replaceState(null,'',location.pathname);
 if(!at) return;
 const pay=JSON.parse(atob(at.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
 const email=(pay.email||'').toLowerCase(); if(!email) return;
 const md=pay.user_metadata||{};
 const name=md.full_name||md.name||email.split('@')[0];
 state.profile={name,email}; state.name=name;
 loadUserSpace(); persist();
 logEvent({event:'sign-in',name,email,when_iso:new Date().toISOString(),home_region:state.home||'',device:'google-oauth'});
 toast('Welcome, '+name+' \uD83E\uDD19 \u2014 signed in with Google');
 if(email===FK_FOUNDER) setTimeout(fkFounder,800);
 render(); }catch(e){} }

/* ---- boot ---- */
fkLoad();
fkFetchStatus().then(()=>render());
setInterval(fkFetchStatus, 15*60*1000);
Object.keys(state.fin.secrets||{}).forEach(r=>fkTryRegion(r));
fkFlushPending();
if(state.geo) fkProximity(state.geo.lat,state.geo.lon,true);
if(state.profile&&state.profile.email===FK_FOUNDER) setTimeout(fkFounder,1200);
fkAuthHash();
setTimeout(fkCrewParam,400);
setTimeout(fkDMPoll,2500); setInterval(fkDMPoll,90000);
render();

</script>
