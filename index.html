<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FlowState — River Surf Forecasting</title>
<meta name="theme-color" content="#2F4A38">
<meta name="description" content="Live flows, hydrographs and predictive wave-window alerts for 156 river surf waves across the US, Canada and Europe — plus a few the map won't show you.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root{
  --hull:#1E2624; --hull2:#161C1A; --panel:#2E3A36; --panel2:#26302C;
  --steel:#55645C; --rust:#6B5A3E; --rivet:#8A7048; --brass:#A8905C; --brass-l:#E3D3A8;
  --canvas:#D8CBAA; --verdi:#5F8F86; --mint:#9FD9C6; --mut:#7E938B; --mut2:#8FA096;
  --mono:"SF Mono",ui-monospace,Menlo,Consolas,"Liberation Mono",monospace;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--mono);color:#C9CDC4;background:var(--hull2);overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(110% 60% at 80% -10%, rgba(95,143,134,.14), transparent 60%),
  radial-gradient(90% 50% at -10% 30%, rgba(107,90,62,.12), transparent 60%), var(--hull2);}
#bg .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.16;animation:drift 30s ease-in-out infinite alternate}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(20px,-16px)}}
#app{position:relative;z-index:1;height:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column}
main{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:62px 16px 120px}
main::-webkit-scrollbar{display:none}

h1{font-size:20px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--canvas)}
h2{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);margin:26px 4px 12px}
h3{font-size:13.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--canvas)}
.sub{color:var(--mut);font-size:12.5px;line-height:1.65}
.tiny{font-size:10.5px;color:var(--mut);letter-spacing:.04em}
.num{font-variant-numeric:tabular-nums}

.card{background:var(--panel);border:2px solid var(--rust);border-radius:var(--r);
  box-shadow:0 4px 18px rgba(0,0,0,.35);padding:16px 18px;margin-bottom:14px;position:relative;transition:transform .25s steps(3)}
.card::before,.card::after{content:"";position:absolute;top:5px;width:6px;height:6px;border-radius:50%;background:var(--rivet)}
.card::before{left:6px}.card::after{right:6px}
.card.press:active{transform:scale(.99)}
.hero{overflow:hidden;padding:0}
.hero::before,.hero::after{z-index:5}
.hero .scene{height:190px;position:relative;border-bottom:1px solid var(--steel)}
.hero .body{padding:14px 18px 16px}
.scene svg{position:absolute;inset:0;width:100%;height:100%}
.spot-mini{display:flex;gap:13px;align-items:center;padding:12px 14px;cursor:pointer}
.spot-mini .thumb{width:56px;height:56px;border-radius:4px;flex:none;position:relative;overflow:hidden;border:1px solid var(--steel)}
.spot-mini .thumb svg{position:absolute;inset:0;width:100%;height:100%}

.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:0;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:1px solid}
.chip .dot{width:6px;height:6px;border-radius:50%}
.c-in{background:#4A6B4E;color:#C9E3B8;border-color:#7E9A6E}.c-in .dot{background:#C9E3B8}
.c-prime{background:#3C3A2A;color:var(--brass-l);border-color:var(--rivet)}.c-prime .dot{background:var(--brass-l)}
.c-low{background:var(--panel2);color:var(--canvas);border-color:var(--steel)}.c-low .dot{background:var(--stone,#B7AD99)}
.c-high{background:#3E5A6B;color:#A8CBE3;border-color:#5F87A0}.c-high .dot{background:#A8CBE3}
.c-na{background:var(--panel2);color:var(--mut);border-color:var(--steel)}.c-na .dot{background:var(--mut)}
.pill{padding:3px 9px;border-radius:0;font-size:10px;letter-spacing:.08em;background:rgba(30,38,36,.85);color:var(--canvas);border:1px solid var(--steel);font-weight:500}

.statrow{display:flex;gap:8px;flex-wrap:wrap}
.stat{flex:1;min-width:82px;background:var(--panel2);border:1px solid var(--steel);border-radius:0;padding:7px 9px 6px;text-align:left}
.stat b{display:block;font-size:16px;font-weight:600;color:var(--mint);letter-spacing:.02em}
.stat span{font-size:8.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em}

nav{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:10px 14px calc(12px + env(safe-area-inset-bottom))}
.navbar{max-width:440px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-around;
  background:#35423D;border-radius:8px;border:2px solid var(--rivet);
  box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(216,203,170,.14);padding:10px 8px 9px}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:#A9B8B0;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;width:64px;transition:color .2s steps(2)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--mint)}
.nav-center{width:60px;height:60px;margin-top:-28px;border-radius:50%;border:2px solid var(--brass);cursor:pointer;
  background:#3A4844;box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(216,203,170,.15);
  display:flex;align-items:center;justify-content:center;color:var(--mint);transition:transform .2s steps(2)}
.nav-center:active{transform:scale(.94)}
.nav-center svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round}
.nav-center.active{border-color:var(--mint);box-shadow:0 8px 26px rgba(0,0,0,.55),0 0 0 3px rgba(159,217,198,.25)}

.btn{border:1px solid var(--steel);border-radius:0;padding:10px 18px;font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:transform .15s steps(2);background:var(--panel2);color:var(--canvas)}
.btn:active{transform:scale(.97)}
.btn-forest{background:#4A6B4E;color:#C9E3B8;border-color:#7E9A6E}
.btn-ghost{background:var(--panel2);color:var(--brass-l);border-color:var(--rivet)}
.btn-sm{padding:7px 12px;font-size:10px}
.vcd{background:var(--panel2);border:1px solid var(--rivet);color:var(--brass-l);font-family:var(--mono);
  font-size:9.5px;letter-spacing:.12em;padding:9px 8px;cursor:pointer;border-radius:0;text-transform:uppercase;transition:all .15s steps(2)}
.vcd.on{background:#4A6B4E;color:#C9E3B8;border-color:#7E9A6E}
.curlbox{background:var(--hull);border:1px solid var(--steel);padding:7px 8px 6px;display:inline-block}
.curlpct{color:var(--mint);font-size:12px;text-align:right;margin-bottom:5px;font-family:var(--mono)}

input,select,textarea{font-family:var(--mono);font-size:13px;color:#C9CDC4;background:var(--hull);
  border:1px solid var(--steel);border-radius:0;padding:10px 13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--verdi);box-shadow:0 0 0 2px rgba(95,143,134,.25)}
.searchwrap{position:relative;margin-bottom:12px}
.searchwrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--mut);fill:none;stroke-width:1.6}
.searchwrap input{padding-left:38px}
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex:none;border:1px solid var(--steel);background:var(--panel2);color:var(--canvas);
  border-radius:0;padding:6px 13px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s steps(2)}
.fbtn.on{background:var(--verdi);color:#0F1A17;border-color:var(--mint)}

#sheet{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;justify-content:flex-end}
#sheet.open{display:flex}
#sheet .scrim{position:absolute;inset:0;background:rgba(10,14,13,.6);opacity:0;transition:opacity .3s}
#sheet.open .scrim{opacity:1}
#sheet .panel{position:relative;background:var(--hull2);border-top:3px solid var(--rust);border-radius:10px 10px 0 0;max-height:92%;overflow-y:auto;
  box-shadow:0 -16px 50px rgba(0,0,0,.6);transform:translateY(100%);transition:transform .35s cubic-bezier(.3,.9,.4,1);padding-bottom:30px}
#sheet.open .panel{transform:translateY(0)}
#sheet .grab{width:44px;height:4px;border-radius:0;background:var(--steel);margin:10px auto 0}
.sheet-scene{height:200px;position:relative;margin:14px 16px 0;border-radius:6px;overflow:hidden;border:2px solid var(--rust)}
.sheet-scene svg{position:absolute;inset:0;width:100%;height:100%}
.sheet-body{padding:16px 20px 0}
.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 2px;border-bottom:1px solid rgba(85,100,92,.35);font-size:12px}
.kv:last-child{border:none}
.kv .k{color:var(--mut);flex:none;text-transform:uppercase;letter-spacing:.08em;font-size:10px;padding-top:2px}
.kv .v{text-align:right;color:#C9CDC4;font-weight:500}
canvas.chart{width:100%;height:170px;display:block}

.iconbtn{width:36px;height:36px;border:none;background:none;box-shadow:none;padding:0;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:transform .15s steps(2)}
.iconbtn:active{transform:scale(.9)}
.iconbtn svg{width:24px;height:24px;stroke:#E6EDE9;fill:rgba(0,0,0,.3);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 5px rgba(0,0,0,.8))}
.iconbtn.on svg{stroke:#C9E3B8;fill:rgba(74,107,78,.9)}
.iconbtn.bell.on svg{stroke:var(--brass-l);fill:rgba(138,112,72,.9)}

.alertitem{display:flex;gap:12px;align-items:flex-start;padding:10px 2px;border-bottom:1px solid rgba(85,100,92,.3)}
.alertitem:last-child{border:none}
.alertitem .ic{width:32px;height:32px;flex:none;border-radius:0;border:1px solid var(--steel);display:flex;align-items:center;justify-content:center;background:var(--hull);color:var(--mint)}
.ripple-load{display:flex;gap:6px;justify-content:center;padding:22px}
.ripple-load span{width:8px;height:8px;border-radius:0;background:var(--verdi);animation:rip 1.2s steps(4) infinite}
.ripple-load span:nth-child(2){animation-delay:.15s}.ripple-load span:nth-child(3){animation-delay:.3s}
@keyframes rip{0%,100%{opacity:.25}50%{opacity:1}}
.fadein{animation:fin .4s steps(6)}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.toast{position:absolute;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);z-index:60;
  background:var(--hull);color:var(--canvas);border:1px solid var(--rivet);padding:11px 20px;border-radius:0;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  box-shadow:0 12px 34px rgba(0,0,0,.55);transition:transform .35s steps(5);max-width:86%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.section-note{margin:4px 6px 14px;font-size:10.5px;color:var(--mut);line-height:1.6}
.predbox{margin-top:12px;padding:11px 13px;border-radius:0;background:var(--hull);border:1px solid var(--steel);border-left:4px solid var(--verdi);font-size:11.5px;line-height:1.6;color:var(--mut2)}
.predbox b{color:var(--mint)}
.moodrow{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.mood{padding:7px 13px;border-radius:0;border:1px solid var(--steel);background:var(--panel2);cursor:pointer;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--canvas)}
.mood.on{background:var(--verdi);color:#0F1A17;border-color:var(--mint)}
.leafrule{display:flex;align-items:center;gap:10px;margin:20px 0 6px;color:var(--verdi)}
.leafrule::before,.leafrule::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(95,143,134,.5),transparent)}
.menubtn{position:absolute;top:12px;right:14px;z-index:25;width:40px;height:40px;background:#35423D;border:1px solid var(--rivet);color:var(--canvas);font-size:15px;cursor:pointer;border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.menudrop{position:absolute;top:58px;right:14px;z-index:26;background:var(--hull);border:2px solid var(--rust);border-radius:6px;box-shadow:0 14px 40px rgba(0,0,0,.6);display:none;flex-direction:column;min-width:180px}
.menudrop.open{display:flex}
.menudrop button,.menudrop a{background:none;border:none;border-bottom:1px solid rgba(85,100,92,.4);color:var(--canvas);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:13px 16px;cursor:pointer;text-align:left;text-decoration:none}
.menudrop button:last-child{border-bottom:none}
.menudrop button:active,.menudrop a:active{background:var(--panel2);color:var(--mint)}
#maphost{position:relative;isolation:isolate;z-index:1}
.wmark{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#26302C;border:2px solid #55645C;color:#8FA096;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.wmark.in{background:#4A6B4E;border-color:#7E9A6E;color:#C9E3B8}
.wmark.prime{background:#3C3A2A;border-color:#8A7048;color:#E3D3A8}
.wmark.high{background:#3E5A6B;border-color:#5F87A0;color:#A8CBE3}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#1E2624 !important;color:#C9CDC4 !important;border:1px solid #55645C;border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.leaflet-container{background:#161C1A;font-family:var(--mono)}
a.leaflet-popup-close-button{color:#7E938B !important}
</style>
</head>

</div>

  </div></nav>
</div>

leases; levels change daily)","conf":"high","notes":"Steel wave shapers installed 2012 as part of the 2.5-mile RushSouth whitewater course (opened 2013 after Eagle & Phenix dam breaching). Doc's 900-2,000 cfs matches AW's 1-unit (900 cfs) river-running level; AW notes s...","access":"Park-and-play from Waveshaper Island off the Columbus RiverWalk (end of 12th St; takeout parking garage at 1028 Front Ave, Columbus GA 31901, free on weekends). Flow is dam-controlled by Georgia Power releases from North Highlands Dam; releases quoted in 'units' (1 unit ~900 cfs, 2 units ~4,500, 3 units ~9,000, 4 units ~13,000). Levels can rise from low to big water within hours - check the daily release schedule.","usgs":true,"vis":"public"},{"id":76,"name":"Treadmill Wave","aka":null,"river":"Chattahoochee River","st":"GA","co":"USA","town":"Columbus","lat":32.4645,"lon":-84.997,"type":"dam-release","src":"USGS","gid":"02341460","gname":"CHATTAHOOCHEE RIVER AT 14TH ST, AT COLUMBUS, GA","fmin":null,"fmax":null,"fopt":13000,"smin":null,"smax":null,"season":null,"conf":"medium","notes":"No feature named 'Treadmill' appears in current AW/park sources; the name is likely a 2013-era surfer nickname (contemporary press described Columbus river surfing as 'like surfing on a treadmill'). Most consistent ma...","access":"Same access as Wave Shaper: park-and-play from Waveshaper Island / Columbus RiverWalk. 13,000 cfs corresponds to a 4-unit Georgia Power release from North Highlands Dam; high releases often occur in the afternoon (reports of levels rising to ~13,000 cfs after 4 p.m.). At 13K there is reliable eddy service at the Good Wave.","usgs":true,"vis":"public"},{"id":77,"name":"Dessert Wave","aka":null,"river":"Mulberry Fork (Black Warrior River)","st":"AL","co":"USA","town":"Garden City","lat":34.006,"lon":-86.755,"type":"natural","src":"USGS","gid":"02450000","gname":"MULBERRY FORK NEAR GARDEN CITY, AL.","fmin":null,"fmax":null,"fopt":null,"smin":5.5,"smax":8.0,"season":"winter-spring (rain-dependent; typically Nov-May)","conf":"medium","notes":"alabamawhitewater.com (old URL redirects to /Run/Details/51) confirms: 'a great wave just downstream [of Lunch Stop] at higher water called Dessert Wave (5.5-8.0 ft.)'. IMPORTANT: those stage numbers are on the local ...","access":"Put in at the old Rt. 31 bridge in Garden City (I-65 exit 287/292); take out at the Birmingham Canoe Club lot at the end of Whitewater Dr. in Whitewater Bend (via Philpot Rd. off US 31). Wave is mid-run: just downstream of Lunch Stop wave, where cliffs appear on river right. Private land around BCC takeout - be discreet and courteous to landowners; park on the bluff side of the road.","usgs":true,"vis":"public"},{"id":78,"name":"Top Hole","aka":"top wave/hole at Moccasin Gap","river":"Coosa River","st":"AL","co":"USA","town":"Wetumpka","lat":32.576,"lon":-86.233,"type":"dam-release","src":"USGS","gid":"02411590","gname":"COOSA RIVER AT HWY 14 NEAR WETUMPKA, AL","fmin":null,"fmax":null,"fopt":6000,"smin":null,"smax":null,"season":"year-round (weekday ~2,000 cfs navigation flow; larger recreational releases typically weekends)","conf":"medium","notes":"Jordan Dam release area near Wetumpka verified; Moccasin Gap is the site of the annual Coosa River Whitewater Festival rodeo and 'the southernmost Class III rapid in Alabama'. The specific name 'Top Hole' is not found...","access":"Put in at the base of Jordan Dam off Rapids Road; Moccasin Gap is ~3.5 mi downstream (flatwater above and below). Takeouts in/near Wetumpka (Gold Star Park at ~7.4 mi). Flow is controlled by Alabama Power's Jordan Dam - release schedule at apcshorelines.com/our-lakes/jordan/. Local rocks are extremely sharp; powerboats can reach the rapid.","usgs":true,"vis":"public"},{"id":79,"name":"Huntington surfing hole","aka":"Wabash River wave, Huntington","river":"Wabash River","st":"IN","co":"USA","town":"Huntington","lat":40.877,"lon":-85.498,"type":"natural","src":"USGS","gid":"03324095","gname":"WABASH RIVER AT ANDREWS, IN (downstream)","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"spring","conf":"low","notes":"AW 3333 verified: 'Wabash - Huntington surfing hole (PnP)', class I-II. River confirmed as the Wabash at Huntington; flows are regulated by the USACE J. Edward Roush Lake dam upstream, and USGS 03323500 (verified, lat...","access":"Access from Etna Avenue in Huntington; parking reported OK in the school drive on weekends. The river-wide ledge 200-300 ft downstream of the bridge forms a ~75-ft-wide class II surfing hole with eddies on both sides - room for 3-4 boats; easy walk back above the ledge for laps. Shallow, slow water below makes rescue easy; good beginner side-surf/flat-spin spot.","usgs":true,"vis":"public"},{"id":80,"name":"Variation Wave","aka":"Variation","river":"James River","st":"VA","co":"USA","town":"Richmond","lat":37.539,"lon":-77.4545,"type":"natural","src":"USGS","gid":"02037500","gname":"JAMES RIVER NEAR RICHMOND, VA","fmin":null,"fmax":null,"fopt":null,"smin":5.5,"smax":9.0,"season":"year-round","conf":"high","notes":"AW 1952 verified: Variation is one of four breaks through the old Hollywood low-head dam (First Break, Variation, Grumman, Dam Drop) - a natural-feeling feature formed at a man-made dam break. Levels on the Westham ga...","access":"Put in at Reedy Creek (James River Park, Riverside Dr. & Hillcrest Rd.); Variation is ~0.62 mi down, about 400 ft river-left of First Break at the L-shaped Hollywood low-head dam upstream of Belle Isle. Great eddy service on river right. Urban run with low-head dams, rebar, and debris; boaters cautioned above 7 ft on the Westham gauge - intermediates should go with a local first. City park access; easy bike/run shuttle.","usgs":true,"vis":"public"},{"id":81,"name":"New Wave","aka":null,"river":"New River","st":"WV","co":"USA","town":"Fayetteville","lat":38.065,"lon":-81.08,"type":"natural","src":"USGS","gid":"03185400","gname":"NEW RIVER AT THURMOND, WV","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":"low","notes":"Could not verify 'New Wave' as a distinct named surf feature in any current source (American Whitewater, riverbreak.com, WV river-surfing press). Documented board-surfing in the New River Gorge area centers on the New...","access":"Fayette Station Road (Route 82) switchbacks from Fayetteville to the river below the New River Gorge Bridge; NPS take-out/put-in on river left below Fayette Station rapid. Coordinates are approximate (Fayette Station area).","usgs":true,"vis":"public"},{"id":82,"name":"5 Boat Hole","aka":"Five Boat Hole; Five-Boat Hole Wave","river":"Gauley River","st":"WV","co":"USA","town":"Swiss / Summersville","lat":38.225,"lon":-81.02,"type":"dam-release","src":"USGS","gid":"03192000","gname":"GAULEY RIVER ABOVE BELVA, WV","fmin":5000,"fmax":7000,"fopt":null,"smin":null,"smax":null,"season":"Sep-Oct (Gauley Season) and high-water/rain events","conf":"medium","notes":"LOCATION CORRECTION: the source doc places 5 Boat Hole on the New River near Fayette Station, but multiple independent sources (gauleyriverrapids.com, riverbreak.com videos with local surfers Chuck Hamilton/Randy Fish...","access":"Center of the river at the bottom of Koontz Flume, first Class V of the Lower Gauley canyon (below Back Ender and a dilapidated cable footbridge). Remote canyon access; most surf it as part of a Lower Gauley run. Beware the giant undercut boulder river-right in Koontz Flume. Coordinates approximate.","usgs":true,"vis":"public"},{"id":83,"name":"Lower Railroad","aka":"Lower Railroad hole","river":"New River","st":"WV","co":"USA","town":"Fayetteville","lat":38.045,"lon":-81.028,"type":"natural","src":"USGS","gid":"03185400","gname":"NEW RIVER AT THURMOND, WV","fmin":null,"fmax":null,"fopt":null,"smin":4.5,"smax":5.5,"season":"Spring high water and after heavy rain","conf":"medium","notes":"American Whitewater: 'At flows from 4.5 to 5.5 feet... catch the large hole near the bottom. This is the best hole on the river with great eddy service. One can spend all day here surfing.' Stage values are the Fayett...","access":"Put in at NPS Cunard river access (steep gravel road); Lower Railroad is the second major rapid, ~1 mile in. Scout from either bank. At 4.5-5.5 ft start from the right bank to miss the top pourover and catch the big hole near the bottom. Hazard: fatalities recorded here; very undercut rock ~50 ft off the left bank at low water (-2 ft). Coordinates approximate.","usgs":true,"vis":"public"},{"id":84,"name":"Surprise Wave","aka":"Surprise rapid hole","river":"New River","st":"WV","co":"USA","town":"Fayetteville / Thurmond","lat":38.005,"lon":-81.005,"type":"natural","src":"USGS","gid":"03185400","gname":"NEW RIVER AT THURMOND, WV","fmin":5000,"fmax":10000,"fopt":null,"smin":null,"smax":null,"season":"Spring high water and after heavy rain","conf":"medium","notes":"American Whitewater (reach 4119): Class III with a big hole; 'Surprise rapid is big enough to stand large rafts vertically at some flows,' and a trip report states 'the hole at the bottom of this rapid gets really jui...","access":"Only significant rapid on the mostly-flatwater Thurmond-to-Cunard section (Class III). Reached by running down from the Thurmond access (Rt. 25) or paddling up-section logistics from Cunard. Coordinates approximate (between Thurmond and Cunard).","usgs":true,"vis":"public"},{"id":85,"name":"The Dries","aka":"New River Dries; Put-In Waves; Dries Wave","river":"New River","st":"WV","co":"USA","town":"Ansted / Gauley Bridge, WV (~5-min drive from Fayetteville)","lat":38.1136,"lon":-81.1425,"type":"dam-release","src":"USGS","gid":"03185400","gname":"NEW RIVER AT THURMOND, WV","fmin":18000,"fmax":null,"fopt":24000,"smin":null,"smax":null,"season":"Nov-May (high-water spill events); plus 7 scheduled 2,200-2,500 cfs releases (too low for the big surf waves)","conf":"high","notes":"World-class board-surf waves when inflow overwhelms Hawks Nest Dam and spills into the normally dewatered 5.5-mi reach. Doc-era range kept: 'the Dries is good when the Thurmond gauge reads 18,000 to 24,000 cfs' (Melan...","access":"Put-In Waves form right next to the WV Route 16 bridge below Hawks Nest Dam; park-and-surf access off Rt. 16, ~5-minute drive from Fayetteville. Hawks Nest Tunnel diverts up to 10,000 cfs, so Dries flow = Thurmond cfs minus ~10,000. Big consequences at surfable levels (huge Class IV+ water). Coordinates from USGS site 380649081083301 (New River below Hawks Nest Dam, stage-only gauge).","usgs":true,"vis":"public"},{"id":86,"name":"Roller Coaster Wave","aka":"Roller Coaster; Roller Coaster Waves","river":"Shenandoah River","st":"WV","co":"USA","town":"Harpers Ferry / Charles Town","lat":39.319,"lon":-77.75,"type":"natural","src":"USGS","gid":"01636500","gname":"SHENANDOAH RIVER AT MILLVILLE, WV","fmin":null,"fmax":null,"fopt":null,"smin":1.7,"smax":4.0,"season":"Year-round; best with spring flows","conf":"medium","notes":"AMBIGUITY RESOLVED: the doc listed this under 'Shenandoah River' with note 'Charleston.' The doc's original link (riverexplorer.com id=750) resolves to the Shenandoah River at Harpers Ferry page, which names the 'Roll...","access":"Park-and-play via the 'Bridge to Bridge' put-in on river left just below the WV US-340 bridge off Shenandoah Street (small NPS lot); Roller Coaster is ~0.35 mi downstream, near the end of the Staircase. Floods out when the Potomac exceeds ~5-5.5 ft on the Point of Rocks gauge. Coordinates approximate.","usgs":true,"vis":"public"},{"id":87,"name":"Geek Wave","aka":"Lower French Kiss wave","river":"Gauley River","st":"WV","co":"USA","town":"Summersville","lat":38.218,"lon":-80.915,"type":"dam-release","src":"USGS","gid":"03189600","gname":"GAULEY RIVER BELOW SUMMERSVILLE DAM, WV","fmin":null,"fmax":null,"fopt":2800,"smin":null,"smax":null,"season":"Sep-Oct (Gauley Season: ~6 weekends of scheduled Summersville Dam drawdown releases, ~2800 cfs standard)","conf":"medium","notes":"GAUGE CORRECTION: the hypothesized gauge 03189100 is actually 'GAULEY RIVER NEAR CRAIGSVILLE, WV' (upstream of Summersville Lake) - the correct below-dam gauge is USGS 03189600 GAULEY RIVER BELOW SUMMERSVILLE DAM, WV ...","access":"A couple miles into the Upper Gauley run from the NPS Tailwaters access at the base of Summersville Dam; surfed as part of an Upper Gauley run (no road access at the wave). Great return eddy allows hours of surfing; bottom of the rapid is shallow, and rafts should avoid the bottom-right slot (pinning rock). Coordinates approximate.","usgs":true,"vis":"public"},{"id":88,"name":"Diagonal Ledges","aka":"Diagonal Ledges wave","river":"Gauley River","st":"WV","co":"USA","town":"Swiss, WV (~45-min drive + hike from Fayetteville)","lat":38.24,"lon":-81.05,"type":"dam-release","src":"USGS","gid":"03192000","gname":"GAULEY RIVER ABOVE BELVA, WV","fmin":2400,"fmax":3600,"fopt":3100,"smin":null,"smax":null,"season":"Sep-Oct (Gauley Season) plus spring/rain flows in range","conf":"high","notes":"One of WV's premier board-surf waves ('one of the best kayak surfs on the entire Gauley' - gauleyriverrapids.com; featured by WV Tourism and WV Public Broadcasting). WV Tourism: surf's up 2400-3600 cfs on the Lower Ga...","access":"Not park-and-play: ~1 hr on rough 4WD/high-clearance roads, then a 45-min to few-mile hike along railroad grade (incl. an old railroad bridge crossing), then a mandatory ferry/swim across the river above a Class IV rapid to reach the river-left ledges. Wave is 3-5 ft tall in a downstream V; short but stout Class IV swim below if you flush. Ask locals (Mountain Surf Paddle Sports, Fayetteville) for beta. Coordinates approximate.","usgs":true,"vis":"public"},{"id":89,"name":"Hidden Wave","aka":null,"river":null,"st":"MD","co":"USA","town":null,"lat":null,"lon":null,"type":"hidden","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":null,"notes":null,"access":null,"usgs":false,"vis":"egg","locked":true},{"id":90,"name":"Dead Cow Hole","aka":"Dead Cow","river":"Potomac River","st":"MD","co":"USA","town":"Potomac","lat":38.98,"lon":-77.22,"type":"natural","src":"USGS","gid":"01646500","gname":"POTOMAC RIVER NEAR WASH, DC LITTLE FALLS PUMP STA","fmin":null,"fmax":null,"fopt":null,"smin":7.4,"smax":9.3,"season":"High water only - typically spring or after major rain events","conf":"medium","notes":"High-water hole documented in AW's Mather Gorge (id 742) rapid database; forms a big hole around 8 ft on the Little Falls gauge, with reported recommendations ranging ~7.4-9.3 ft depending on boat/source. YouTube foot...","access":"Same access as Mather Gorge section: MD side via C&O towpath near Great Falls Tavern/Lock 17, or paddle up from Anglers Inn (carry ~0.4 mi from canal). High-water Potomac play - experts only at these levels.","usgs":true,"vis":"public"},{"id":91,"name":"Virginia Chute","aka":"VA Chute","river":"Potomac River","st":"MD","co":"USA","town":"Brookmont (Bethesda), MD / Arlington, VA; ~2 mi from Washington DC","lat":38.936,"lon":-77.121,"type":"natural","src":"USGS","gid":"01646500","gname":"POTOMAC RIVER NEAR WASH, DC LITTLE FALLS PUMP STA","fmin":null,"fmax":null,"fopt":null,"smin":3.3,"smax":3.9,"season":"Year-round, level-dependent","conf":"high","notes":"River forms the MD/VA/DC boundary (MD owns the riverbed); the chute itself hugs the Virginia shore. Location confirmed: Virginia Chute is at Little Falls rapid (AW id 90), not Mather Gorge. potomac.surf lists best sur...","access":"Access via Lock 6 / Brookmont (C&O Canal) on the MD side; the chute is on river right (VA side) immediately before the main rapid - short slide into a deceptively powerful, deep hole. Little Falls is a serious class III+ rapid; Maryland posts caution at 3.5 ft and danger at 4.5 ft on this gauge. Gauge itself sits just upstream of Little Falls dam.","usgs":true,"vis":"public"},{"id":92,"name":"The Connie","aka":"Connoquenessing wave","river":"Connoquenessing Creek","st":"PA","co":"USA","town":"Ellwood City","lat":40.837,"lon":-80.254,"type":"natural","src":"USGS","gid":"03106000","gname":"Connoquenessing Creek near Zelienople, PA","fmin":null,"fmax":null,"fopt":null,"smin":2.5,"smax":5.0,"season":"Typically fall-spring and after rain (356 sq mi free-flowing basin; low in summer)","conf":"medium","notes":"Gauge verified: USGS 03106000 'Connoquenessing Creek near Zelienople, PA' is actually located at Hazen, 4 mi SE of Ellwood City - ideal for this wave (record since 1919). AW (id 1599) says section is best 2.5-5 ft; wa...","access":"Put in at the railroad bridge on South River Road southeast of Ellwood City; the surf wave is just below the put-in. Wave exists at every level; good eddy service below 5 ft, above 5 ft it must be caught on the fly.","usgs":true,"vis":"public"},{"id":93,"name":"Greenhouse Park Wave","aka":"Stonycreek Whitewater Park wave; Johnstown play park wave","river":"Stonycreek River","st":"PA","co":"USA","town":"Tire Hill / Johnstown","lat":40.2766,"lon":-78.9233,"type":"man-made (whitewater park)","src":"USGS","gid":"03040000","gname":"Stonycreek River at Ferndale, PA","fmin":450,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Park open April-October; best flows spring and after rain","conf":"medium","notes":"IMPORTANT gauge correction: Stonycreek at Ferndale is USGS 03040000 (03041000 is Little Conemaugh River at East Conemaugh, PA). Whitewater park verified - exact coordinates 40.2766/-78.9233 from thestonycreek.com. AW ...","access":"Greenhouse Park, Route 403 at Tire Hill just south of Johnstown (11-acre park, parking, picnic area). 300-yard in-channel whitewater park opened 2008 - PA's first; class I-II features with a lighted surf wave for night sessions. Hosts the annual Stonycreek Rendezvous (Benscreek Canoe Club).","usgs":true,"vis":"public"},{"id":94,"name":"Swimmers Rapid Wave","aka":"Swimmers' Hole; Swimmer's Rapid","river":"Youghiogheny River","st":"PA","co":"USA","town":"Ohiopyle","lat":39.859,"lon":-79.512,"type":"natural","src":"USGS","gid":"03081500","gname":"Youghiogheny River at Ohiopyle, PA","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Year-round; summer flows sustained by upstream Youghiogheny River Lake releases (dam-influenced but a natural rapid)","conf":"medium","notes":"Gauge correction: the Ohiopyle gauge is USGS 03081500 'Youghiogheny River at Ohiopyle, PA' - 03081000 exists but is 'Youghiogheny River below Confluence, PA', ~10 mi upstream below the Yough Dam/Casselman confluence (...","access":"Ohiopyle State Park; launch below Ohiopyle Falls. Lead-in starts immediately below the ledge below Dimple Rock - stay center (nasty hole on the right), eddies both sides above Swimmers. Eddy service at the hole itself is poor, so many catch it on the fly. Heavy commercial raft traffic in season; DCNR permits required.","usgs":true,"vis":"public"},{"id":95,"name":"Hidden Wave","aka":null,"river":null,"st":"OH","co":"USA","town":null,"lat":null,"lon":null,"type":"hidden","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":null,"notes":null,"access":null,"usgs":false,"vis":"egg","locked":true},{"id":96,"name":"Deep Fork River Wave","aka":null,"river":"Deep Fork River","st":"OK","co":"USA","town":"Oklahoma City","lat":35.53,"lon":-97.46,"type":"natural","src":"USGS","gid":"07242380","gname":"Deep Fork at Warwick, OK","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Only after heavy rain (flashy urban runoff)","conf":"low","notes":"Doc's 'Deep Fork of the Canadian River' is imprecise - the Deep Fork is a tributary of the North Canadian River (impounded at Lake Eufaula downstream). No named/established wave could be verified; evidence is a single...","access":"No documented public surf access. The Deep Fork rises in northern Oklahoma City and flows northeast toward Arcadia Lake (Edmond); paddler reports describe deep, muddy water and trashy banks in the OKC/Arcadia reach. A YouTube clip ('Oklahoma City Deep Fork River First Surf') shows surfing after heavy rainfall, location unspecified.","usgs":true,"vis":"public"},{"id":97,"name":"Tulsa Wave Park (Zink Dam)","aka":"Zink Lake whitewater flume; formerly the wave below old Zink (lowhead) Dam","river":"Arkansas River","st":"OK","co":"USA","town":"Tulsa","lat":36.128,"lon":-95.996,"type":"man-made (whitewater park)","src":"USGS","gid":"07164500","gname":"Arkansas River at Tulsa, OK","fmin":null,"fmax":500,"fopt":null,"smin":null,"smax":null,"season":"Year-round, daily 9am-dusk, subject to lake level, flood, maintenance, and water-quality closures","conf":"high","notes":"2026 status confirmed: the 2013-era wave below the old Zink lowhead dam no longer exists - the dam was rebuilt (construction 2020-2024) and Zink Lake + Tulsa Wave Park opened Labor Day weekend 2024; as of 2026 the par...","access":"Access from Zink Lake or the east-bank River Parks trail near the Gathering Place (Riverside Dr, Tulsa 74107). Zone 1 (closest to Zink Dam) is the most challenging; intensity decreases downstream. Adjustable wave shapers in each of the 7 play zones; kayaking, surfing, SUP, and tubing permitted. Park closes when Zink Lake drops 2 ft below max pool. Status: www.tulsazinklake.com.","usgs":true,"vis":"public"},{"id":98,"name":"Hidden Wave","aka":null,"river":null,"st":"MI","co":"USA","town":null,"lat":null,"lon":null,"type":"hidden","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":null,"notes":null,"access":null,"usgs":false,"vis":"egg","locked":true},{"id":99,"name":"Hidden Wave","aka":null,"river":null,"st":"WI","co":"USA","town":null,"lat":null,"lon":null,"type":"hidden","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":null,"notes":null,"access":null,"usgs":false,"vis":"egg","locked":true},{"id":10 l,"season":null,"conf":null,"notes":null,"access":null,"usgs":false,"vis":"egg","locked":true},{"id":104,"name":"White Rock Playpark","aka":"White Rock Dam play spot","river":"Pawcatuck River","st":"RI","co":"USA","town":"Westerly","lat":41.401,"lon":-71.834,"type":"natural","src":"USGS","gid":"01118500","gname":"PAWCATUCK RIVER AT WESTERLY, RI","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Historically winter/spring high water (long-term mean flow at Westerly ~577 cfs)","conf":"low","notes":"Could not verify a formal 'playpark' - the 2013-era doc likely refers to informal kayak play at the old breached White Rock Dam (pre-removal video exists on YouTube). Dam removal confirmed (began fall 2015). No Americ...","access":"Former play spot at the breached White Rock Dam, ~2 mi upstream of downtown Westerly (White Rock Rd area). STATUS: the White Rock Dam was removed in 2015-2016 (USFWS/RIDEM Hurricane Sandy resilience project) - the pre-removal hydraulic/wave feature no longer exists in its old form. Some class II remains in the lower Pawcatuck (e.g., the broken dam millrace at Stillman Ave in downtown Westerly). WPWA publishes paddling maps for the reach.","usgs":true,"vis":"public"},{"id":105,"name":"Souadabscook Stream wave","aka":"candidates: Manning Mill bridge wave/hole (Hermon), Cement Plant wave, Rec Center hole (Hampden)","river":"Souadabscook Stream","st":"ME","co":"USA","town":"Hermon","lat":44.752,"lon":-68.943,"type":"natural","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Early spring snowmelt (one of Maine's most popular early-spring runs; annual race). Doc notes wettest month is November","conf":"low","notes":"No active USGS gauge exists on Souadabscook Stream (verified: none found; levels are read from a painted gauge on the river-left abutment of the Emerson Mill bridge - locals cite ~0 ft as minimum, 1.5-2 ft+ for the pl...","access":"Usual put-in at Manning Mill Bridge in Hermon (a fun wave/hole forms right after the bridge; landowners upstream have taken issue with trespassers). Downstream play: 'Great Expectations' waves, an excellent retentive hole below the Rec Center dam (above 2 ft), and the 'Cement Plant' play wave with good eddy access below the snowmobile bridge (2 ft+). Grand Falls (class IV) between them - scout or take out at Paper Mill. Hell's Gate (class V, tide-dependent) below the Main Rd bridge in Hampden.","usgs":false,"vis":"public"},{"id":106,"name":"Elephant Rock","aka":"Elephant Rock Rapid (adjacent features: Elephant's Foot, Pinball)","river":"Dead River","st":"ME","co":"USA","town":"West Forks / The Forks","lat":45.295,"lon":-70.075,"type":"dam-release","src":"other","gid":null,"gname":null,"fmin":2400,"fmax":8000,"fopt":5500,"smin":null,"smax":null,"season":"Scheduled release season May-October; top high-water releases early May (per doc), incl. early-May turbine-test days","conf":"medium","notes":"Gauge source is Brookfield Renewable (Safewaters) / Waterline flow phone - no active USGS gauge. GAUGE CORRECTION: USGS 01047000 is the Carrabassett River near North Anson, ME - NOT the Dead River. Both historical Dea...","access":"Remote 15-mile wilderness run; put in at Spencer Stream/Grand Falls (long dirt-road shuttle from Rt 201), take out at West Forks. Elephant Rock is at ~mile 7.6 - usually a pour-over class III with a huge surfing hole extending from the rock toward center river; 'Pinball' slot at the bottom river-right between Elephant's Foot and a ledge. Flows are 100% controlled by Brookfield's Long Falls Dam (Flagstaff Lake); check Safewaters or call 1-800-557-3569 (Kennebec > Flagstaff). High-water releases stop at 1 pm.","usgs":false,"vis":"public"},{"id":107,"name":"Sheepscot River wave","aka":"Sheepscot Reversing Falls, Sheepscot Falls","river":"Sheepscot River","st":"ME","co":"USA","town":"Sheepscot village (Alna/Newcastle), ME; ~5 mi from Wiscasset","lat":44.054,"lon":-69.629,"type":"tidal","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Year-round, tide-dependent: wave builds ~2 hours after high tide and gives roughly a 2-hour play window on the ebb; best on big/king tides (11+ ft)","conf":"medium","notes":"Confirmed tidal wave type - one of Maine's few surfable reversing falls (AW reach 3634 'Sheepscot - Reversing Falls'). Flow fields null because the wave is tide-driven, not CFS-driven; use NOAA tide predictions (Wisca...","access":"Park at the Grange Hall in Alna (technically the Newcastle side) and paddle a short distance downstream to the falls. The feature evolves through the tide cycle: first an eddy line on river left (stern squirts, peel-out practice for beginners), developing into a glassy green wave for old-school surfing; boils and eddy lines get pushy at max ebb - intermediate skills recommended. Popular with sea kayakers (Southern Maine Sea Kayaking Network runs sessions here).","usgs":false,"vis":"public"},{"id":108,"name":"Skookumchuck Narrows","aka":"Skook, Sechelt Rapids","river":"Sechelt Inlet (tidal rapid, not a river)","st":"BC","co":"Canada","town":"Egmont, BC (Sunshine Coast)","lat":49.7406,"lon":-123.8967,"type":"tidal","src":"other","gid":null,"gname":"Fisheries and Oceans Canada (DFO) current predictions for Sechelt Rapids","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Year-round; Jul-Aug most pleasant with afternoon peak tides","conf":"high","notes":"Source doc said 'San Juan Islands' - corrected: this is Sechelt Inlet / Sunshine Coast, BC (there is a different Skookumchuck River in WA). No river gauge applies; use DFO tidal current tables (Sechelt Rapids station,...","access":"Park at Skookumchuck Narrows Provincial Park trailhead near Egmont; ~4 km hike to Roland Point. Session logic is tide-based, not gauge-based: the wave forms on FLOOD tides when current exceeds ~11 knots; 11-12.9 kn good first-timer level, 12-15 kn optimal, 13+ kn big freestyle. Arrive ~2 hours before peak current for the longest session.","usgs":false,"vis":"public"},{"id":109,"name":"Okisollo Tidal Rapids","aka":"Okisollo, Surge Narrows area rapids","river":"Okisollo Channel (tidal rapid, not a river)","st":"BC","co":"Canada","town":"Heriot Bay (Quadra Island) / Campbell River","lat":50.3,"lon":-125.26,"type":"tidal","src":"other","gid":null,"gname":"DFO tidal current predictions (Okisollo Channel / Surge Narrows area)","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Year-round, tide-dependent; summer preferred for weather","conf":"medium","notes":"Original bc-ww.com link appears dead (site defunct). Coordinates approximate for the Upper Rapids surf spot. Tide-based logic: wave quality set by size of tidal exchange (knots), not a hydrometric gauge.","access":"Boat access only - typically launched from Quadra Island (Surge Narrows Road / Village Bay) or Campbell River area; remote wilderness setting, cold water, strong whirlpools on big exchanges. Timed to tidal exchanges like Skookumchuck.","usgs":false,"vis":"public"},{"id":110,"name":"Fernie Whitewater Park","aka":"Fernie surf wave (successor concept to the flood-destroyed Ghostrider wave)","river":"Elk River","st":"BC","co":"Canada","town":"Fernie","lat":49.504,"lon":-115.063,"type":"man-made (whitewater park)","src":"Environment Canada","gid":"08NK002","gname":"ELK RIVER AT FERNIE","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":"medium","notes":"This is/was a whitewater park PROJECT - research did not confirm a completed surf wave; the earlier natural Ghostrider wave north of Fernie was destroyed by floods. No published surfable flow range. Gauge 08NK002 veri...","access":"In-town access at Dogwood Park, Fernie. Fernie Whitewater Society formed 2012; S2o Designs (Scott Shipley) produced concept plans including a surf wave, training features and race course.","usgs":false,"vis":"public"},{"id":111,"name":"Industrial Wave","aka":"Industrial Hole; part of the Rock Island play complex (with Trail Wave, Hero Hole, One Shot, The Stacks)","river":"Columbia River","st":"BC","co":"Canada","town":"Trail","lat":49.11,"lon":-117.7,"type":"natural","src":"Environment Canada","gid":"08NE049","gname":"COLUMBIA RIVER AT BIRCHBANK","fmin":127100,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":"high","notes":"Metric source values: Industrial Hole in at 3600 cms and up (= ~127,100 cfs). Other complex features: Trail Wave & Hero Hole 800-1300 cms (~28,300-45,900 cfs); One Shot and The Stacks 2200-2800 cms (~77,700-98,900 cfs...","access":"Roadside/urban access at Trail; features formed by bedrock of Rock Island splitting the flow. Big-volume expert playspots; conditions change with Hugh Keenleyside Dam operations upstream.","usgs":false,"vis":"public"},{"id":112,"name":"Brilliant Wave","aka":"Brilliant playspots: Solstice, Lucky 13","river":"Kootenay River","st":"BC","co":"Canada","town":"Castlegar","lat":49.3226,"lon":-117.6276,"type":"dam-release","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Spring-summer; spring/early-summer levels give up to four surfable features, lower summer levels give a good learner/SUP wave","conf":"medium","notes":"Doc said 'Kootney River Bridge - Creston BC' - corrected: Brilliant is on the lower Kootenay River near CASTLEGAR (Creston is a different Kootenay-region town ~100 km away). No EC station ID could be verified for the ...","access":"Near Brilliant Bridge just outside Castlegar; short carry from road. Character ranges from trashy deep hole to large green bouncy wave depending on Brilliant Dam (FortisBC) discharge.","usgs":false,"vis":"public"},{"id":113,"name":"Habitat 67","aka":"H67, Vague Habitat 67 (sister spot: Right Sides)","river":"St. Lawrence River","st":"QC","co":"Canada","town":"Montreal","lat":45.5003,"lon":-73.542,"type":"natural","src":"Environment Canada","gid":"02OA016","gname":"SAINT-LAURENT (FLEUVE) A LASALLE","fmin":null,"fmax":279000,"fopt":254300,"smin":null,"smax":null,"season":"Year-round (winter surfed by hardcore locals but dangerous due to ice chunks)","conf":"high","notes":"Metric flow reference (Riverbreak, using Quebec CEHQ station 001003 St. Lawrence discharge - same reach as EC 02OA016): optimal ~7200 cms (~254,300 cfs); easy/beginner-friendly in the upper 7000s cms; wave stops break...","access":"2600 Av. Pierre-Dupuy, Montreal: park in the pull-off past the address, walk behind the tennis courts and down a dirt path to the wave. ~2-minute walk back to a lineup that can get long. Long swim in rapids if you lose the wave; whirlpool behind the bigger wave; not for weak swimmers. Discovered by kayakers - share the wave. KSF surf school teaches here.","usgs":false,"vis":"public"},{"id":114,"name":"Vague a Guy","aka":"Guy's Wave, LaSalle wave","river":"St. Lawrence River","st":"QC","co":"Canada","town":"Montreal (LaSalle)","lat":45.4227,"lon":-73.6031,"type":"natural","src":"Environment Canada","gid":"02OA016","gname":"SAINT-LAURENT (FLEUVE) A LASALLE","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"May 1 - Oct 15 (water sports prohibited outside this window by borough rules)","conf":"high","notes":"This resolves the doc's 'Lasalle wave' entry: it is the Vague a Guy at Parc des Rapides on the Lachine Rapids reach, Montreal's main beginner wave (Habitat 67 is the advanced wave). No published numeric flow range - v...","access":"City-sanctioned access in Parc des Rapides: stairs and docks for entry/exit, barriers, signage and changing cabins installed by the borough. U-shaped rock formation near shore creates a steady, very consistent learner-friendly standing wave. KSF (corner of Bishop-Power and boul. LaSalle, ~500 m downstream) rents gear and teaches lessons here. Named for Guy, a pioneering local kayaker.","usgs":false,"vis":"public"},{"id":115,"name":"Buseater","aka":"Bus Eater, Mini-Bus / Big Bus (two related waves at different levels)","river":"Ottawa River","st":"ON","co":"Canada","town":"Foresters Falls / Beachburg","lat":45.71,"lon":-76.7,"type":"natural","src":"other","gid":null,"gname":"Physical painted gauge below McCoys Chute (the reference all local sources use); online mirror by Shaggy Designs; regional data from Ottawa River Regulation Planning Board","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Apr-Jun (spring high water)","conf":"medium","notes":"Doc listed under Quebec; the Rocher Fendu channels are on the Ontario side (river forms the ON/QC border). Buseater forms at HIGH water when Garburator (the low-water wave in the same rapid) washes out; no verifiable ...","access":"Public access at the Lorne courtesy of OWL Rafting and Whitewater Ontario; trails on both banks allow repeat laps. Main Channel put-in: OWL public put-in off McCoy Chute trail (off Grants Settlement Rd near Foresters Falls); take-out Blacks access, 1298 Grant Settlement Rd. One of the most famous big waves in kayaking; rafts routinely flip here.","usgs":false,"vis":"public"},{"id":116,"name":"Gladiator","aka":null,"river":"Ottawa River","st":"ON","co":"Canada","town":"Foresters Falls / Beachburg","lat":45.69,"lon":-76.72,"type":"natural","src":"other","gid":null,"gname":"Physical painted gauge below McCoys Chute (local reference); online mirror by Shaggy Designs; Ottawa River Regulation Planning Board","fmin":null,"fmax":null,"fopt":null,"smin":20,"smax":null,"season":"Spring flood only (typically Apr-May peak runoff)","conf":"medium","notes":"Forms only at levels 'above 20' on the local painted McCoys gauge (feet on local datum, NOT an EC station or true stage - recorded in stage_min_ft with that caveat). One of the largest river waves ever surfed; host to...","access":"Experts only: you must run the entire Coliseum rapid (the biggest rapid on the river) for every ride, with The Ledge - a massive pour-over hole - close behind the wave. Trails on both banks; observation deck on river left overlooks Coliseum. Same Main Channel access as Buseater (McCoys Chute put-in / Blacks take-out near Foresters Falls).","usgs":false,"vis":"public"},{"id":117,"name":"Black Mass","aka":"Messe Noire","river":"Mistassibi River","st":"QC","co":"Canada","town":"Saint-Stanislas / Dolbeau-Mistassini, QC (Lac-Saint-Jean region)","lat":48.99,"lon":-72.26,"type":"natural","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Apr-Jun (spring freshet; classic 'Stakeout' big-wave season, typically May)","conf":"medium","notes":"Enormous snowmelt playwave that builds and crashes in cycles; famous from freestyle-kayak Stakeout films. Quebec provincial (CEHQ/DEH) gauges cover the Mistassibi but a specific station ID and surfable flow range coul...","access":"Rapids reached from the Saint-Stanislas area off Route 373 north of Dolbeau-Mistassini; surfers/kayakers hike back upstream along the bank after each ride. Class IV-V big-water section (other rapids: Hawaii, H2O, Moby Dick, Overdose, Colorado). Cold snowmelt water - full rubber.","usgs":false,"vis":"public"},{"id":118,"name":"Kananaskis Whitewater Park (Canoe Meadows)","aka":"The Mountain Wave (ARSA/Surf Anywhere wave, built 2014, upgraded 2019); Shallows; slalom course features","river":"Kananaskis River","st":"AB","co":"Canada","town":"Seebe / Exshaw, AB (~45-60 min west of Calgary)","lat":51.087,"lon":-115.04,"type":"dam-release","src":"Environment Canada","gid":"05BF025","gname":"KANANASKIS RIVER BELOW BARRIER DAM","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Primarily May-Sep; surfable whenever TransAlta is generating (hydropeaking - near-zero flow when not generating)","conf":"high","notes":"Doc's 'Barrier Dam release' framing verified: TransAlta hydropeaking means water on = surfable, water off = dry. The Mountain Wave (built 2014 by ARSA/Surf Anywhere, upgraded 2019) is billed as the best river surf wav...","access":"Park-and-play at Canoe Meadows day-use area off Hwy 40, Kananaskis Country (doc's 'Calgary area' = ~1 hr from Calgary). Flow is entirely controlled by TransAlta's Barrier Dam hydropeaking; check the TransAlta river-flows page (https://transalta.com/river-flows/) for near-real-time release times before driving out.","usgs":false,"vis":"public"},{"id":119,"name":"Calgary River Wave Park (10th Street Wave project)","aka":"SurfYYC wave park; related: Harvie Passage Whitewater Park","river":"Bow River","st":"AB","co":"Canada","town":"Calgary","lat":51.0535,"lon":-114.085,"type":"man-made (whitewater park)","src":"Environment Canada","gid":"05BH004","gname":"BOW RIVER AT CALGARY","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Concept: year-round except floods and heavy ice cover; Harvie Passage surfed mainly summer","conf":"medium","notes":"Resolves the 2013 'New River Surf Park - Calgary' note: it evolved into (a) the ARSA/Surf Anywhere Calgary River Wave Park proposal at the 10th Street Bridge (feasibility 2018, design report 2019-2020, still unbuilt a...","access":"10th Street site is downtown at the Louise Bridge/Kensington gravel bar (bar grew dramatically after the 2013 flood). Harvie Passage (rebuilt post-flood, reopened 2018) is in Inglewood at the old Bow River weir - hazardous high-water structure, obey signage; ARSA/AWA are developing an adjustable beginner wave in its low-water channel.","usgs":false,"vis":"public"},{"id":120,"name":"RiverBend","aka":null,"river":null,"st":"AB","co":"Canada","town":null,"lat":null,"lon":null,"type":"natural","src":null,"gid":null,"gname":null,"fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":"low","notes":"UNRESOLVED. Web research found no Alberta surf wave or playspot documented under the name 'RiverBend' (searches surfaced only Bend, Oregon and Calgary's Riverbend neighbourhood on the Bow River). Possibly a local/defu...","access":null,"usgs":false,"vis":"public"},{"id":121,"name":"Sundre wave ('Sundry - RDR')","aka":"Red Deer River play features near Sundre","river":"Red Deer River","st":"AB","co":"Canada","town":"Sundre","lat":51.796,"lon":-114.64,"type":"natural","src":"Environment Canada","gid":"05CA001","gname":"RED DEER RIVER NEAR SUNDRE","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":null,"conf":"low","notes":"Doc's cryptic 'Sundry - RDR' interpreted as Red Deer River near Sundre, AB (spelling-corrected), consistent with the doc's Alberta grouping. Gauge verified to exist: 05CA001 RED DEER RIVER NEAR SUNDRE (discharge); a l...","access":"The upper Red Deer around Sundre is Alberta's most-used natural whitewater corridor (Mukwah/Big Rock area upstream); multiple road-accessible surf spots along Hwy 584 / Coal Camp Rd corridor.","usgs":false,"vis":"public"},{"id":122,"name":"Lower Brierlies hole","aka":"Brierlies Rapids, Brierley's","river":"North Saskatchewan River","st":"AB","co":"Canada","town":"Nordegg, AB (Rocky Mountain House is the larger town downstream)","lat":52.38,"lon":-116.05,"type":"natural","src":"Environment Canada","gid":"05DC001","gname":"NORTH SASKATCHEWAN RIVER AT ROCKY MOUNTAIN HOUSE","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"May-Sep (typical paddling season; glacial/snowmelt-fed summer flows)","conf":"medium","notes":"Gauge 05DC001 (also mirrored at rivers.alberta.ca) is the reference local outfitters use for this reach. Regional guidance says 80-150 cms (~2,800-5,300 cfs) is a low, friendly range for the reach generally, but no ho...","access":"Popular drop-in at the Forestry Trunk Road (734) bridge, 11 km off Hwy 11 just west of Nordegg. A series of small waves culminating in a uniform sandstone ledge - park-and-play surfing, dunking and swimming; Class II max.","usgs":false,"vis":"public"},{"id":123,"name":"Nutimik Rapids (Sturgeon Falls)","aka":"Sturgeon Falls playspots: Big Mouth, Surfers, Chameleon, Triple S, SlideShow, Number 4","river":"Winnipeg River (Whiteshell River confluence area at Nutimik Lake)","st":"MB","co":"Canada","town":"Seven Sisters Falls / Nutimik Lake campground, MB (~130 km east of Winnipeg)","lat":50.08,"lon":-95.7,"type":"natural","src":null,"gid":null,"gname":null,"fmin":35000,"fmax":null,"fopt":75000,"smin":null,"smax":null,"season":"Flow-dependent (regulated river); best during high-flow periods, typically late spring-summer of wet years","conf":"medium","notes":"Doc's 'Nutimik Rapids' verified as the Sturgeon Falls playspot where the Whiteshell River/Winnipeg River system enters Nutimik Lake, Whiteshell PP, MB. Flow guidance from local sources (already in cfs): worth the trip...","access":"From Hwy 11 turn east on Hwy 307 into Whiteshell PP; turn off at Nutimik Lake Campground. Launch at the campground boat launch, paddle ~1-1.5 km across/along the right sandy shore of Nutimik Lake to the rapids. ~10 ft total drop over a long gradient with 15+ surfable waves/holes; Big Mouth surges/breaks about every 20 s and can exceed 2 m with barrel sections in best conditions.","usgs":false,"vis":"public"},{"id":124,"name":"Slave River Wave","aka":"Slave River rapids play waves (Mountain Portage 'Playground'; rapids: Cassette, Pelican, Mountain Portage, Rapids of the Drowned)","river":"Slave River","st":"NT","co":"Canada","town":"Fort Smith, NWT","lat":59.98,"lon":-111.92,"type":"natural","src":"Environment Canada","gid":"07NB001","gname":"SLAVE RIVER AT FITZGERALD (ALBERTA)","fmin":null,"fmax":null,"fopt":null,"smin":null,"smax":null,"season":"Jun-Sep (ice-free, warm-weather window; hosts the annual Slave River Paddlefest in August)","conf":"medium","notes":"Gauge verified: 07NB001 at Fort Fitzgerald, AB (59.863 N, -111.591 W), immediately upstream of the rapids. Typical open-water flows run in the low thousands of cms, but no published surf-specific flow range exists - w...","access":"Access from Fort Smith, NWT: island trails and boat access to Mountain Portage Rapids ('the Playground' function sessionOpen(){
  const d=new Date(), m=d.getMonth()+1, dow=d.getDay(), y=d.getFullYear();
  const t=new Date(y,4,31); const memorial=new Date(y,4,31-((t.getDay()+6)%7));
  const s=new Date(y,8,1); const labor=new Date(y,8,1+((8-s.getDay())%7));
  if(m<4||m>10) return {open:false, phase:'Closed for winter — reopens in spring'};
  const fri=new Date(memorial); fri.setDate(memorial.getDate()-3);
  if(d>=fri && d<=labor) return {open:true, phase:'Peak season — open daily (Memorial Day–Labor Day)'};
  const wknd=(dow===0||dow===5||dow===6);
  return {open:wknd, phase:'Shoulder season — weekend & limited hours'};
}
function assess(w){
  if(w.hours){ const s=sessionOpen(); return {code:s.open?'IN':'LOW', label:s.open?'SHRED READY ✓':'DRY LAND', cls:s.open?'c-in':'c-low', val:null, useStage:false, session:s}; }
  const lv = w.gid ? state.live[w.gid] : null;
  const useStage = (w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
  const val = lv ? (useStage? lv.stage : (lv.flow!=null?lv.flow:(w.smin!=null||w.smax!=null? lv.stage:null))) : null;
  const lo = useStage? w.smin : (w.fmin!=null?w.fmin:(w.fopt!=null?w.fopt*0.75:null));
  const hi = useStage? w.smax : (w.fmax!=null?w.fmax:(w.fopt!=null?w.fopt*1.35:null));
  if(val==null || (lo==null&&hi==null)) return {code:'NA',label:'NO SIGNAL',cls:'c-na',val,useStage};
  if(lo!=null && val<lo){ return (val>=lo*0.82)? {code:'PRIME',label:'ALMOST THERE',cls:'c-prime',val,useStage} : {code:'LOW',label:'DRY LAND',cls:'c-low',val,useStage}; }
  if(hi!=null && val>hi){ return (val<=hi*1.18)? {code:'PRIME',label:'ON THE DROP',cls:'c-prime',val,useStage} : {code:'HIGH',label:'DEEP WATER',cls:'c-high',val,useStage}; }
  return {code:'IN',label:'FLOW STATE ✓',cls:'c-in',val,useStage};
}
function regress(pts){ // linear fit over time (hours)
  if(!pts||pts.length<6) return null;
  const t0=pts[0].t; const xs=pts.map(p=>(p.t-t0)/3.6e6), ys=pts.map(p=>p.v);
  const n=xs.length, sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
  const sxx=xs.reduce((a,b)=>a+b*b,0), sxy=xs.reduce((a,x,i)=>a+x*ys[i],0);
  const den=n*sxx-sx*sx; if(Math.abs(den)<1e-9) return null;
  const b=(n*sxy-sx*sy)/den, a=(sy-b*sx)/n;
  const ym=sy/n; let ssr=0,sst=0;
  ys.forEach((y,i)=>{ const f=a+b*xs[i]; ssr+=(y-f)**2; sst+=(y-ym)**2; });
  return {slope:b, r2: sst>0? Math.max(0,1-ssr/sst):0, last:ys[n-1]};
}
function predict(w){
  const gid=w.gid; if(!gid||!state.series[gid]) return null;
  const useStage=(w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
  const pts = state.series[gid].filter(p=>p.param===(useStage?'00065':'00060'));
  const cut = Date.now()-48*3.6e6;
  const recent = pts.filter(p=>p.t>=cut).map(p=>({t:p.t,v:p.v}));
  const fit = regress(recent); if(!fit) return null;
  const lo = useStage? w.smin : (w.fmin!=null?w.fmin:(w.fopt!=null?w.fopt*0.75:null));
  const hi = useStage? w.smax : (w.fmax!=null?w.fmax:(w.fopt!=null?w.fopt*1.35:null));
  const v=fit.last, sl=fit.slope; // per hour
  const unit = useStage? 'ft':'cfs';
  const trendTxt = Math.abs(sl) < (useStage? 0.005 : Math.max(1,v*0.002)) ? 'steady' : (sl>0?'rising':'falling');
  const conf = fit.r2>0.8?'high':fit.r2>0.5?'moderate':'low';
  let eta=null, event=null;
  const hrsTo = target => (target-v)/sl;
  if(lo!=null && v<lo && sl>0){ const h=hrsTo(lo); if(h>0&&h<24*14){eta=h; event='in';} }
  else if(hi!=null && v>hi && sl<0){ const h=hrsTo(hi); if(h>0&&h<24*14){eta=h; event='in';} }
  else if(lo!=null&&(hi==null||v<=hi)&&v>=lo&&sl<0){ const h=hrsTo(lo); if(h>0&&h<24*14){eta=h; event='out';} }
  else if(hi!=null&&v<=hi&&(lo==null||v>=lo)&&sl>0){ const h=hrsTo(hi); if(h>0&&h<24*14){eta=h; event='out';} }
  const etaTxt = eta==null?null:(eta<30? Math.round(eta)+' hours' : (eta/24).toFixed(1)+' days');
  return {trendTxt, slope:sl, conf, eta, etaTxt, event, useStage, unit, r2:fit.r2};
}
function predText(w,p){
  if(!p) return null;
  if(p.event==='in') return `<b>${esc(w.name)} projected to come IN within ~${p.etaTxt}</b> — ${p.trendTxt} ${p.slope>0?'+':''}${p.useStage?p.slope.toFixed(2)+' ft/hr':Math.round(p.slope)+' cfs/hr'} (trend confidence: ${p.conf}).`;
  if(p.event==='out') return `<b>Window closing:</b> projected to drop out of range in ~${p.etaTxt} — ${p.trendTxt} (confidence: ${p.conf}).`;
  return `Flow is <b>${p.trendTxt}</b>${p.trendTxt!=='steady'? ` at ${p.useStage?p.slope.toFixed(2)+' ft/hr':Math.round(Math.abs(p.slope))+' cfs/hr'}`:''} — no range crossing projected in the next 14 days (confidence: ${p.conf}).`;

async function fetchTextChain(url){

  for(const u of tries){ try{ const r=await fetch(u); if(!r.ok) continue; const t=await r.text(); if(t&&t.length>40) return t; }catch(e){} }

}
function parseUSBRHead(txt){
  /* USBR Hydromet v1 CSV: header 'DateTime,beno_gh,beno_hj,beno_q,...,ceno_qc,...,arno_qc,...'
     Flow columns: beno_q (river), ceno_qc / arno_qc (canal diversions). Position-safe split. */
  const out=[]; if(!txt) return out;
  const lines=txt.split(/\r?\n/);
  let hdr=null;
  for(const ln of lines){ if(/datetime/i.test(ln)||(/date/i.test(ln)&&/beno|ceno|arno/i.test(ln))){
    hdr=ln.split(',').map(s=>s.trim().toLowerCase()); break; } }
  if(!hdr) return out;
  const col=(...names)=>{ for(const n of names){ const k=hdr.indexOf(n); if(k>0) return k; }
    return hdr.findIndex(h=>names.some(n=>h===n)); };
  const bi=col('beno_q','beno_qr','beno_qd'), ci=col('ceno_qc','ceno_q','ceno_qr'), ai=col('arno_qc','arno_q','arno_qr');
  if(bi<1||ci<1||ai<1) return out;
  for(const ln of lines){
    const c=ln.split(',');
    if(c.length<=Math.max(bi,ci,ai)) continue;
    const ds=c[0].trim(); if(!/\d{1,2}:\d{2}/.test(ds)) continue;
    const t=new Date(ds.replace(/(\d{2})\/(\d{2})\/(\d{4})/,'$3-$1-$2')).getTime();
    if(isNaN(t)) continue;
    const b=parseFloat(c[bi]), cc=parseFloat(c[ci]), aa=parseFloat(c[ai]);
    if([b,cc,aa].some(v=>isNaN(v)||v<-900)) continue;
    /* 101.5 cfs: calibrated channel/seepage loss, Benham Falls -> head of park */
    out.push({t, v:Math.max(0, b-cc-aa-101.5), param:'00060'});
  }
  out.sort((x,y)=>x.t-y.t); return out;
}
async function fetchGreenWaveSeries(days){
  /* FlowState Head-of-Park engine: flow at the Bend Whitewater Park =
     Benham Falls inflow minus the two canal diversions above the wave.
     Tier 1: FlowState's self-hosted relay (head.json, refreshed by our
     scheduled GitHub Action). Tier 2: compute live from USBR Hydromet. */
  try{ if(location.protocol.indexOf('http')===0){
    const r=await fetch('./head.json?t='+Math.floor(Date.now()/6e5));
    if(r.ok){ const j=await r.json();
      if(j.temp_c!=null){ const rec=state.live['14070500']=state.live['14070500']||{}; rec.temp=j.temp_c; }
      const pts=(j.series||[]).map(p=>({t:p[0],v:p[1],param:'00060'})).filter(p=>p.v!=null&&!isNaN(p.t));
      const cut=Date.now()-days*864e5; const f=pts.filter(p=>p.t>=cut);
      if(f.length>=2 && (Date.now()-f[f.length-1].t) < 4*3.6e6)

    } } }catch(e){}

  if(pts.length>=2) return {pts, src:'FlowState Head-of-Park engine · USBR direct'};
  return null;
}

    }catch(e){ state.liveErr=(e&&e.message)||String(e); console.warn('USGS fetch failed',e); }
  }
  for(const g of gids){ const wv=WAVES.find(x=>x.gid===g&&x.usbr); if(!wv) continue;
    try{ const res=await fetchGreenWaveSeries(2);
      if(res&&res.pts.length){ const last=res.pts[res.pts.length-1];
        if(Date.now()-last.t<=30*864e5){ const rec=state.live[g]=state.live[g]||{};
          rec.flow=last.v; rec.t=last.t; rec.src='head'; state.liveOk=Date.now(); state.srcNote[g]=res.src; continue; } }
      state.srcNote[g]='Head-of-park sources unreachable — showing NOAA below-Bend gauge (undercounts the wave)';
    }catch(e){ state.srcNote[g]='Head-of-park fetch error — showing NOAA below-Bend gauge (undercounts the wave)'; }
  }
  const lids={}; gids.forEach(g=>{ const wv=WAVES.find(x=>x.gid===g&&x.nws); if(wv && !(state.live[g]&&state.live[g].src==='head')) lids[wv.nws]=g; });
  for(const lid in lids){
    try{
      const r=await fetch('https://api.water.noaa.gov/nwps/v1/gauges/'+lid);
      if(!r.ok) throw new Error('NWPS HTTP '+r.status);
      const j=await r.json(); const o=j&&j.status&&j.status.observed;
      if(o&&o.validTime){ const t=new Date(o.validTime).getTime();
        if(Date.now()-t<=30*864e5){ const rec=state.live[lids[lid]]=state.live[lids[lid]]||{};
          if(o.primary!=null&&o.primary>-999) rec.stage=o.primary;
          if(o.secondary!=null&&o.secondary>-999) rec.flow=(o.secondaryUnit==='kcfs')? o.secondary*1000 : o.secondary;
          rec.t=t; state.liveOk=Date.now();
          state.srcNote[lids[lid]] = (state.srcNote[lids[lid]]&&state.srcNote[lids[lid]].includes('undercount'))? 'NOAA below-Bend gauge — undercounts the wave · '+lid : 'NOAA NWPS · '+lid; } }
    }catch(e){ console.warn('NWPS fetch failed',e); }
  }
}
async function fetchSeries(gid, days=7){
  const wu=WAVES.find(x=>x.gid===gid&&x.usbr);
  if(wu){ try{ const res=await fetchGreenWaveSeries(days);
      if(res&&res.pts.length>=3){ state.series[gid]=res.pts;
        const last=res.pts[res.pts.length-1];
        if(Date.now()-last.t < 4*3.6e6){ const rec=state.live[gid]=state.live[gid]||{};
          rec.flow=last.v; rec.t=last.t; rec.src='head'; state.liveOk=Date.now(); state.srcNote[gid]=res.src; }
        return res.pts; } }catch(e){} }
  const wv=WAVES.find(x=>x.gid===gid&&x.nws);
  if(wv){
    try{
      const r=await fetch('https://api.water.noaa.gov/nwps/v1/gauges/'+wv.nws+'/stageflow/observed');
      if(!r.ok) throw new Error('NWPS HTTP '+r.status);
      const j=await r.json(); const out=[]; const kcfs=(j.secondaryUnits==='kcfs');
      const cut=Date.now()-days*864e5;
      (j.data||[]).forEach(d=>{ const t=new Date(d.validTime).getTime(); if(t<cut) return;
        if(d.secondary!=null&&d.secondary>-999) out.push({t,v:kcfs?d.secondary*1000:d.secondary,param:'00060'});
        if(d.primary!=null&&d.primary>-999) out.push({t,v:d.primary,param:'00065'});
      });
      out.sort((a,b)=>a.t-b.t); state.series[gid]=out; return out;
    }catch(e){ console.warn('NWPS series fail',e); return null; }
  }
  if(!/^\d{7,15}$/.test(gid)) return null;
  try{
    const r=await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${gid}&parameterCd=00060,00065&period=P${days}D`);
    if(!r.ok) throw new Error('USGS HTTP '+r.status);
    const j=await r.json(); const out=[];
    (j.value.timeSeries||[]).forEach(ts=>{
      const p=ts.variable.variableCode[0].value;
      (ts.values[0]?ts.values[0].value:[]).forEach(vv=>{
        const num=parseFloat(vv.value); if(isNaN(num)||num<=-99999) return;
        out.push({t:new Date(vv.dateTime).getTime(), v:num, param:p});
      });
    });
    out.sort((a,b)=>a.t-b.t); state.series[gid]=out; return out;
  }catch(e){ console.warn('series fail',e); return null; }
}

function curlBars(level,s){let h='';CURL_BODY.forEach((b,r)=>{const top=r===13,frac=(r+1)/14;
  const on=level!=null&&frac<=level;const col=on?(frac>0.8?'#9FD9C6':'#5F8F86'):'#3A4844';
  h+=`<div style="position:absolute;left:${Math.round(b[0]*s)}px;bottom:${Math.round(r*9*s)}px;width:${Math.round(b[1]*s)}px;height:${top?Math.max(2,Math.round(5*s)):Math.max(2,Math.round(6*s))}px;border-radius:3px;background:${col}"></div>`});return h;}
function curlBox(id,s,level){const w=Math.round(240*s),h=Math.round(122*s);
  return `<div class="curlbox"><div class="curlpct" id="${id}-pct">${level!=null?Math.round(level*100)+'%':'--'}</div><div id="${id}" style="position:relative;width:${w}px;height:${h}px">${curlBars(level,s)}</div></div>`;}
function fillLevel(w){if(w.hours){return sessionOpen().open?0.95:0.15;}
  const a=assess(w); if(a.val==null) return null;
  const lo=a.useStage?w.smin:(w.fmin!=null?w.fmin:(w.fopt!=null?w.fopt*0.75:null));
  const hi=a.useStage?w.smax:(w.fmax!=null?w.fmax:(w.fopt!=null?w.fopt*1.35:null));
  if(lo==null) return null;
  if(a.val<lo) return Math.max(0.06,0.9*a.val/lo);
  if(hi!=null&&a.val>hi) return 1;
  return hi!=null? 0.9+0.1*(a.val-lo)/Math.max(1e-9,hi-lo) : 0.95;}
const _curlT={};
function curlAnimate(id,target,s){const el=document.getElementById(id);if(!el)return;
  if(_curlT[id])clearInterval(_curlT[id]);
  if(target==null){el.innerHTML=curlBars(null,s);const p=document.getElementById(id+'-pct');if(p)p.textContent='--';return;}
  let lvl=0;_curlT[id]=setInterval(()=>{if(!document.getElementById(id)){clearInterval(_curlT[id]);return;}
    lvl=Math.min(target,lvl+0.035);

    const el=$('#featured-pred'); if(el){ const p=predict(f); el.innerHTML= p? predText(f,p) : '<span class="tiny">Not enough recent gauge data for a trend.</span>'; } }

    curlAnimate('curl-sheet', s.open?0.95:0.15, 0.55); return; }

}
function drawHydro(w, series){
  const cv=$('#hydro'); if(!cv) return; const note=$('#hydroNote');
  const dpr=window.devicePixelRatio||1; const cw=cv.clientWidth||360, ch=170;
  cv.width=cw*dpr; cv.height=ch*dpr; const g=cv.getContext('2d'); g.scale(dpr,dpr);
  g.clearRect(0,0,cw,ch);
  const useStage=(w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
  const pts=(series||[]).filter(p=>p.param===(useStage?'00065':'00060'));
  if(!pts.length){ g.fillStyle='#7E938B'; g.font='13px sans-serif'; g.textAlign='center'; g.fillText('No recent gauge series available',cw/2,ch/2); if(note)note.textContent=''; return; }
  const t0=pts[0].t, t1=pts[pts.length-1].t + (t1_ext=>0)(0);
  const p=predict(w); const ext = p&&p.eta? Math.min(p.eta,96)*3.6e6 : 0;
  const tmax=pts[pts.length-1].t+ext;
  const lo=useStage?w.smin:(w.fmin!=null?w.fmin:(w.fopt?w.fopt*0.75:null));
  const hi=useStage?w.smax:(w.fmax!=null?w.fmax:(w.fopt?w.fopt*1.35:null));
  let vmin=Math.min(...pts.map(p=>p.v)), vmax=Math.max(...pts.map(p=>p.v));
  if(lo!=null){vmin=Math.min(vmin,lo);vmax=Math.max(vmax,lo);} if(hi!=null){vmin=Math.min(vmin,hi);vmax=Math.max(vmax,hi);}
  const pad=(vmax-vmin)*0.15||1; vmin-=pad; vmax+=pad;
  const X=t=>28+(t-t0)/(tmax-t0)*(cw-40), Y=v=>10+(1-(v-vmin)/(vmax-vmin))*(ch-38);
  // band
  if(lo!=null||hi!=null){ const yTop=Y(hi!=null?hi:vmax), yBot=Y(lo!=null?lo:vmin);
    g.fillStyle='rgba(95,143,134,.18)'; g.fillRect(28,yTop,cw-40,yBot-yTop);
    g.strokeStyle='rgba(159,217,198,.45)'; g.setLineDash([4,4]); g.beginPath();
    if(hi!=null){g.moveTo(28,yTop);g.lineTo(cw-12,yTop);} if(lo!=null){g.moveTo(28,yBot);g.lineTo(cw-12,yBot);} g.stroke(); g.setLineDash([]); }
  // area+line
  g.beginPath(); pts.forEach((pp,i)=>{ const x=X(pp.t),y=Y(pp.v); i?g.lineTo(x,y):g.moveTo(x,y); });
  g.strokeStyle='#9FD9C6'; g.lineWidth=2.2; g.lineJoin='round'; g.stroke();
  g.lineTo(X(pts[pts.length-1].t),ch-28); g.lineTo(X(t0),ch-28); g.closePath();
  const grad=g.createLinearGradient(0,0,0,ch); grad.addColorStop(0,'rgba(95,143,134,.35)'); grad.addColorStop(1,'rgba(95,143,134,.04)');
  g.fillStyle=grad; g.fill();
  // trend extension
  if(p&&ext>0){ const last=pts[pts.length-1];
    g.beginPath(); g.moveTo(X(last.t),Y(last.v)); g.lineTo(X(last.t+ext),Y(last.v+p.slope*(ext/3.6e6)));
    g.strokeStyle='rgba(168,144,92,.95)'; g.setLineDash([6,5]); g.lineWidth=2; g.stroke(); g.setLineDash([]); }
  // now dot
  const last=pts[pts.length-1];
  g.beginPath(); g.arc(X(last.t),Y(last.v),4.5,0,7); g.fillStyle='#9FD9C6'; g.fill();
  g.beginPath(); g.arc(X(last.t),Y(last.v),8,0,7); g.strokeStyle='rgba(159,217,198,.3)'; g.stroke();
  // labels
  g.fillStyle='#7E938B'; g.font='10.5px sans-serif'; g.textAlign='left';
  g.fillText((useStage?vmax.toFixed(1)+' ft':Math.round(vmax).toLocaleString()),4,16);
  g.fillText((useStage?vmin.toFixed(1)+' ft':Math.round(vmin).toLocaleString()),4,ch-30);
  g.textAlign='center';
  for(let d=0;d<=7;d+=2){ const t=t0+d*864e5; if(t>tmax)break; g.fillText(new Date(t).toLocaleDateString(undefined,{weekday:'short'}),X(t),ch-14); }
  if(note) note.textContent=`Latest: ${useStage? last.v+' ft':fmtFlow(last.v)} at ${new Date(last.t).toLocaleString(undefined,{weekday:'short',hour:'numeric',minute:'2-digit'})} · USGS provisional data`;
}

function ensureLeaflet(cb){ if(window.L){cb();return;}
  const l=document.createElement('link'); l.rel='stylesheet'; l.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'; document.head.appendChild(l);
  const s=document.createElement('script'); s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload=cb; s.onerror=()=>{ const h=$('#maphost'); if(h) h.innerHTML='<div class="sub" style="padding:20px">Map library could not load — check your connection.</div>'; };
  document.head.appendChild(s);
}
let _map=null;
function hydrateMap(){ ensureLeaflet(()=>{
  const host=$('#maphost'); if(!host||!window.L) return;
  if(_map){ try{_map.remove();}catch(e){} _map=null; }
  _map=L.map(host,{zoomSnap:.5}).setView([45,-105],3.5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:18}).addTo(_map);
  const wsvg='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18C5 8 11 4 16 4c-3 3-4 6-3 8 3-2 6-1 8 2-6-1-12 1-18 4z"/></svg>';
  const mks={};
  WAVES.forEach(w=>{ if(w.lat==null||w.lon==null) return;
    const a=assess(w); const cls=a.code==='IN'?'in':a.code==='PRIME'?'prime':a.code==='HIGH'?'high':'';
    const ic=L.divIcon({className:'',html:`<div class="wmark ${cls}">${wsvg}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    mks[w.id]=L.marker([w.lat,w.lon],{icon:ic}).addTo(_map)
     .bindPopup(`<div style="font-family:monospace;font-size:11px;letter-spacing:.05em"><b style="color:#D8CBAA">${esc(w.name).toUpperCase()}</b><br><span style="color:#7E938B">${esc(w.river||'')} · ${a.label}</span><br><button onclick="openSheet(${w.id})" style="margin-top:6px;background:#26302C;border:1px solid #8A7048;color:#E3D3A8;font-family:monospace;font-size:10px;letter-spacing:.1em;padding:5px 10px;cursor:pointer">OPEN CARD ›</button></div>`);
  });
  if(state.chartFocus!=null){ const fw=WAVES[state.chartFocus]; const mk=mks[state.chartFocus]; state.chartFocus=null;
    if(fw&&fw.lat!=null){ _map.setView([fw.lat,fw.lon],11); if(mk) setTimeout(()=>{try{mk.openPopup();}catch(e){}},300); } }
});}

/* ---- crypto ---- */
const FK_B32='0123456789bcdefghjkmnpqrstuvwxyz';
function fkGh(lat,lon,prec=6){let idx=0,bit=0,even=true,g='';let la=[-90,90],lo=[-180,180];
 while(g.length<prec){ if(even){const m=(lo[0]+lo[1])/2; if(lon>=m){idx=idx*2+1;lo[0]=m}else{idx*=2;lo[1]=m}}
  else{const m=(la[0]+la[1])/2; if(lat>=m){idx=idx*2+1;la[0]=m}else{idx*=2;la[1]=m}}
  even=!even; if(++bit==5){g+=FK_B32[idx];bit=0;idx=0}} return g;}
function fkCells(lat,lon){ const dla=180/Math.pow(2,15), dlo=360/Math.pow(2,15); const out=new Set();
 for(let i=-1;i<=1;i++) for(let j=-1;j<=1;j++) out.add(fkGh(lat+i*dla,lon+j*dlo,6)); return [...out]; }
async function fkKey(secret){ const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(secret),'PBKDF2',false,['deriveKey']);
 return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('FlowState-finkey-v1'),iterations:60000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']); }
async function fkOpen(b64,secret){ try{ const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},await fkKey(secret),raw.slice(12));
 return JSON.parse(new TextDecoder().decode(pt)); }catch(e){ return null; } }

async function fkServer(body){ try{

 return await r.json(); }catch(e){ return null; } }
async function fkFetchStatus(){ try{

function fkLoad(){ const p=userNS(); state.fin=store.get(p+'fin',{keys:{},unlocked:{},secrets:{},pending:[],progress:{}});

/* ---- trend-aware statuses ---- */
function fkFit(w){ try{ const gid=w.gid; if(!gid||!state.series[gid]) return null;
 const useStage=(w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
 const pts=state.series[gid].filter(p=>p.param===(useStage?'00065':'00060'));
 const cut=Date.now()-48*3.6e6;
 return regress(pts.filter(p=>p.t>=cut).map(p=>({t:p.t,v:p.v}))); }catch(e){ return null; } }
const _fk_assess=assess; assess=function(w){ const a=_fk_assess(w);
 if(!a||a.code!=='IN'||w.hours||a.val==null) return a;
 const lo=a.useStage?w.smin:(w.fmin!=null?w.fmin:(w.fopt!=null?w.fopt*0.75:null));
 const hi=a.useStage?w.smax:(w.fmax!=null?w.fmax:(w.fopt!=null?w.fopt*1.35:null));
 if(lo==null) return a;
 const span=(hi!=null&&hi>lo)?(hi-lo):lo;
 const p=(a.val-lo)/span;
 if(p<=0.10) return Object.assign(a,{label:'WATCH YER FINS BRAH',cls:'c-prime'});
 if(p<=0.28) return Object.assign(a,{label:'LOW END OF GOOD',cls:'c-in'});
 const fit=fkFit(w);
 if(fit&&fit.r2>0.5&&fit.slope*24<-0.10*a.val) return Object.assign(a,{label:'STARTING TO DROP',cls:'c-prime'});
 return a; };
