<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>FlowState — River Surf Forecasting</title>
<meta name="theme-color" content="#2F4A38">
<meta name="description" content="Live flows, hydrographs and predictive wave-window alerts for 156 river surf waves across the US, Canada and Europe — plus a few the map won't show you.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
:root{
  --hull:#1E2624; --hull2:#161C1A; --panel:#2E3A36; --panel2:#26302C;
  --steel:#55645C; --rust:#6B5A3E; --rivet:#8A7048; --brass:#A8905C; --brass-l:#E3D3A8;
  --canvas:#D8CBAA; --verdi:#5F8F86; --mint:#9FD9C6; --mut:#7E938B; --mut2:#8FA096;
  --mono:"SF Mono",ui-monospace,Menlo,Consolas,"Liberation Mono",monospace;
  --r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--mono);color:#C9CDC4;background:var(--hull2);overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(110% 60% at 80% -10%, rgba(95,143,134,.14), transparent 60%),
  radial-gradient(90% 50% at -10% 30%, rgba(107,90,62,.12), transparent 60%), var(--hull2);}
#bg .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.16;animation:drift 30s ease-in-out infinite alternate}
@keyframes drift{from{transform:translate(0,0)}to{transform:translate(20px,-16px)}}
#app{position:relative;z-index:1;height:100%;max-width:520px;margin:0 auto;display:flex;flex-direction:column}
main{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:62px 16px 120px}
main::-webkit-scrollbar{display:none}

h1{font-size:20px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--canvas)}
h2{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);margin:26px 4px 12px}
h3{font-size:13.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--canvas)}
.sub{color:var(--mut);font-size:12.5px;line-height:1.65}
.tiny{font-size:10.5px;color:var(--mut);letter-spacing:.04em}
.num{font-variant-numeric:tabular-nums}

.card{background:var(--panel);border:2px solid var(--rust);border-radius:var(--r);
  box-shadow:0 4px 18px rgba(0,0,0,.35);padding:16px 18px;margin-bottom:14px;position:relative;transition:transform .25s steps(3)}
.card::before,.card::after{content:"";position:absolute;top:5px;width:6px;height:6px;border-radius:50%;background:var(--rivet)}
.card::before{left:6px}.card::after{right:6px}
.card.press:active{transform:scale(.99)}
.hero{overflow:hidden;padding:0}
.hero::before,.hero::after{z-index:5}
.hero .scene{height:190px;position:relative;border-bottom:1px solid var(--steel)}
.hero .body{padding:14px 18px 16px}
.scene svg{position:absolute;inset:0;width:100%;height:100%}
.spot-mini{display:flex;gap:13px;align-items:center;padding:12px 14px;cursor:pointer}
.spot-mini .thumb{width:56px;height:56px;border-radius:4px;flex:none;position:relative;overflow:hidden;border:1px solid var(--steel)}
.spot-mini .thumb svg{position:absolute;inset:0;width:100%;height:100%}

.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:0;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:1px solid}
.chip .dot{width:6px;height:6px;border-radius:50%}
.c-in{background:#4A6B4E;color:#C9E3B8;border-color:#7E9A6E}.c-in .dot{background:#C9E3B8}
.c-prime{background:#3C3A2A;color:var(--brass-l);border-color:var(--rivet)}.c-prime .dot{background:var(--brass-l)}
.c-low{background:var(--panel2);color:var(--canvas);border-color:var(--steel)}.c-low .dot{background:var(--stone,#B7AD99)}
.c-high{background:#3E5A6B;color:#A8CBE3;border-color:#5F87A0}.c-high .dot{background:#A8CBE3}
.c-na{background:var(--panel2);color:var(--mut);border-color:var(--steel)}.c-na .dot{background:var(--mut)}
.pill{padding:3px 9px;border-radius:0;font-size:10px;letter-spacing:.08em;background:rgba(30,38,36,.85);color:var(--canvas);border:1px solid var(--steel);font-weight:500}

.statrow{display:flex;gap:8px;flex-wrap:wrap}
.stat{flex:1;min-width:82px;background:var(--panel2);border:1px solid var(--steel);border-radius:0;padding:7px 9px 6px;text-align:left}
.stat b{display:block;font-size:16px;font-weight:600;color:var(--mint);letter-spacing:.02em}
.stat span{font-size:8.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em}

nav{position:absolute;bottom:0;left:0;right:0;z-index:30;padding:10px 14px calc(12px + env(safe-area-inset-bottom))}
.navbar{max-width:440px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-around;
  background:#35423D;border-radius:8px;border:2px solid var(--rivet);
  box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(216,203,170,.14);padding:10px 8px 9px}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:#A9B8B0;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;width:64px;transition:color .2s steps(2)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--mint)}
.nav-center{width:60px;height:60px;margin-top:-28px;border-radius:50%;border:2px solid var(--brass);cursor:pointer;
  background:#3A4844;box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(216,203,170,.15);
  display:flex;align-items:center;justify-content:center;color:var(--mint);transition:transform .2s steps(2)}
.nav-center:active{transform:scale(.94)}
.nav-center svg{width:28px;height:28px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round}
.nav-center.active{border-color:var(--mint);box-shadow:0 8px 26px rgba(0,0,0,.55),0 0 0 3px rgba(159,217,198,.25)}

.btn{border:1px solid var(--steel);border-radius:0;padding:10px 18px;font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:transform .15s steps(2);background:var(--panel2);color:var(--canvas)}
.btn:active{transform:scale(.97)}
.btn-forest{background:#4A6B4E;color:#C9E3B8;border-color:#7E9A6E}
.btn-ghost{background:var(--panel2);color:var(--brass-l);border-color:var(--rivet)}
.btn-sm{padding:7px 12px;font-size:10px}
.vcd{background:var(--panel2);border:1px solid var(--rivet);color:var(--brass-l);font-family:var(--mono);
  font-size:9.5px;letter-spacing:.12em;padding:9px 8px;cursor:pointer;border-radius:0;text-transform:uppercase;transition:all .15s steps(2)}
.vcd.on{background:#4A6B4E;color:#C9E3B8;border-color:#7E9A6E}
.curlbox{background:var(--hull);border:1px solid var(--steel);padding:7px 8px 6px;display:inline-block}
.curlpct{color:var(--mint);font-size:12px;text-align:right;margin-bottom:5px;font-family:var(--mono)}

input,select,textarea{font-family:var(--mono);font-size:13px;color:#C9CDC4;background:var(--hull);
  border:1px solid var(--steel);border-radius:0;padding:10px 13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--verdi);box-shadow:0 0 0 2px rgba(95,143,134,.25)}
.searchwrap{position:relative;margin-bottom:12px}
.searchwrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--mut);fill:none;stroke-width:1.6}
.searchwrap input{padding-left:38px}
.filters{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex:none;border:1px solid var(--steel);background:var(--panel2);color:var(--canvas);
  border-radius:0;padding:6px 13px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s steps(2)}
.fbtn.on{background:var(--verdi);color:#0F1A17;border-color:var(--mint)}

#sheet{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;justify-content:flex-end}
#sheet.open{display:flex}
#sheet .scrim{position:absolute;inset:0;background:rgba(10,14,13,.6);opacity:0;transition:opacity .3s}
#sheet.open .scrim{opacity:1}
#sheet .panel{position:relative;background:var(--hull2);border-top:3px solid var(--rust);border-radius:10px 10px 0 0;max-height:92%;overflow-y:auto;
  box-shadow:0 -16px 50px rgba(0,0,0,.6);transform:translateY(100%);transition:transform .35s cubic-bezier(.3,.9,.4,1);padding-bottom:30px}
#sheet.open .panel{transform:translateY(0)}
#sheet .grab{width:44px;height:4px;border-radius:0;background:var(--steel);margin:10px auto 0}
.sheet-scene{height:200px;position:relative;margin:14px 16px 0;border-radius:6px;overflow:hidden;border:2px solid var(--rust)}
.sheet-scene svg{position:absolute;inset:0;width:100%;height:100%}
.sheet-body{padding:16px 20px 0}
.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 2px;border-bottom:1px solid rgba(85,100,92,.35);font-size:12px}
.kv:last-child{border:none}
.kv .k{color:var(--mut);flex:none;text-transform:uppercase;letter-spacing:.08em;font-size:10px;padding-top:2px}
.kv .v{text-align:right;color:#C9CDC4;font-weight:500}
canvas.chart{width:100%;height:170px;display:block}

.iconbtn{width:36px;height:36px;border:none;background:none;box-shadow:none;padding:0;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:transform .15s steps(2)}
.iconbtn:active{transform:scale(.9)}
.iconbtn svg{width:24px;height:24px;stroke:#E6EDE9;fill:rgba(0,0,0,.3);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 5px rgba(0,0,0,.8))}
.iconbtn.on svg{stroke:#C9E3B8;fill:rgba(74,107,78,.9)}
.iconbtn.bell.on svg{stroke:var(--brass-l);fill:rgba(138,112,72,.9)}

.alertitem{display:flex;gap:12px;align-items:flex-start;padding:10px 2px;border-bottom:1px solid rgba(85,100,92,.3)}
.alertitem:last-child{border:none}
.alertitem .ic{width:32px;height:32px;flex:none;border-radius:0;border:1px solid var(--steel);display:flex;align-items:center;justify-content:center;background:var(--hull);color:var(--mint)}
.ripple-load{display:flex;gap:6px;justify-content:center;padding:22px}
.ripple-load span{width:8px;height:8px;border-radius:0;background:var(--verdi);animation:rip 1.2s steps(4) infinite}
.ripple-load span:nth-child(2){animation-delay:.15s}.ripple-load span:nth-child(3){animation-delay:.3s}
@keyframes rip{0%,100%{opacity:.25}50%{opacity:1}}
.fadein{animation:fin .4s steps(6)}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.toast{position:absolute;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);z-index:60;
  background:var(--hull);color:var(--canvas);border:1px solid var(--rivet);padding:11px 20px;border-radius:0;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  box-shadow:0 12px 34px rgba(0,0,0,.55);transition:transform .35s steps(5);max-width:86%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.section-note{margin:4px 6px 14px;font-size:10.5px;color:var(--mut);line-height:1.6}
.predbox{margin-top:12px;padding:11px 13px;border-radius:0;background:var(--hull);border:1px solid var(--steel);border-left:4px solid var(--verdi);font-size:11.5px;line-height:1.6;color:var(--mut2)}
.predbox b{color:var(--mint)}
.moodrow{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.mood{padding:7px 13px;border-radius:0;border:1px solid var(--steel);background:var(--panel2);cursor:pointer;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--canvas)}
.mood.on{background:var(--verdi);color:#0F1A17;border-color:var(--mint)}
.leafrule{display:flex;align-items:center;gap:10px;margin:20px 0 6px;color:var(--verdi)}
.leafrule::before,.leafrule::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(95,143,134,.5),transparent)}
.menubtn{position:absolute;top:12px;right:14px;z-index:25;width:40px;height:40px;background:#35423D;border:1px solid var(--rivet);color:var(--canvas);font-size:15px;cursor:pointer;border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.menudrop{position:absolute;top:58px;right:14px;z-index:26;background:var(--hull);border:2px solid var(--rust);border-radius:6px;box-shadow:0 14px 40px rgba(0,0,0,.6);display:none;flex-direction:column;min-width:180px}
.menudrop.open{display:flex}
.menudrop button,.menudrop a{background:none;border:none;border-bottom:1px solid rgba(85,100,92,.4);color:var(--canvas);font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:13px 16px;cursor:pointer;text-align:left;text-decoration:none}
.menudrop button:last-child{border-bottom:none}
.menudrop button:active,.menudrop a:active{background:var(--panel2);color:var(--mint)}
#maphost{position:relative;isolation:isolate;z-index:1}
.wmark{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#26302C;border:2px solid #55645C;color:#8FA096;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.wmark.in{background:#4A6B4E;border-color:#7E9A6E;color:#C9E3B8}
.wmark.prime{background:#3C3A2A;border-color:#8A7048;color:#E3D3A8}
.wmark.high{background:#3E5A6B;border-color:#5F87A0;color:#A8CBE3}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:#1E2624 !important;color:#C9CDC4 !important;border:1px solid #55645C;border-radius:4px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.leaflet-container{background:#161C1A;font-family:var(--mono)}
a.leaflet-popup-close-button{color:#7E938B !important}
</style>
</head>

<div id="bg">
  <div class="blob" style="width:340px;height:300px;top:-80px;right:-100px;background:#5F8F86"></div>

</div>

      Favorites</button>
  </div></nav>
</div>

function sessionOpen(){

  const t=new Date(y,4,31); const memorial=new Date(y,4,31-((t.getDay()+6)%7));
  const s=new Date(y,8,1); const labor=new Date(y,8,1+((8-s.getDay())%7));
  if(m<4||m>10) return {open:false, phase:'Closed for winter — reopens in spring'};
  const fri=new Date(memorial); fri.setDate(memorial.getDate()-3);
  if(d>=fri && d<=labor) return {open:true, phase:'Peak season — open daily (Memorial Day–Labor Day)'};
  const wknd=(dow===0||dow===5||dow===6);
  return {open:wknd, phase:'Shoulder season — weekend & limited hours'};
}

  if(w.hours){ const s=sessionOpen(); return {code:s.open?'IN':'LOW', label:s.open?'SHRED READY ✓':'DRY LAND', cls:s.open?'c-in':'c-low', val:null, useStage:false, session:s}; }

  const useStage = (w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
  const val = lv ? (useStage? lv.stage : (lv.flow!=null?lv.flow:(w.smin!=null||w.smax!=null? lv.stage:null))) : null;
  const lo = useStage? w.smin : (w.fmin!=null?w.fmin:(w.fopt!=null?w.fopt*0.75:null));
  const hi = useStage? w.smax : (w.fmax!=null?w.fmax:(w.fopt!=null?w.fopt*1.35:null));
  if(val==null || (lo==null&&hi==null)) return {code:'NA',label:'NO SIGNAL',cls:'c-na',val,useStage};

function regress(pts){ // linear fit over time (hours)

  const sxx=xs.reduce((a,b)=>a+b*b,0), sxy=xs.reduce((a,x,i)=>a+x*ys[i],0);
  const den=n*sxx-sx*sx; if(Math.abs(den)<1e-9) return null;
  const b=(n*sxy-sx*sy)/den, a=(sy-b*sx)/n;

  ys.forEach((y,i)=>{ const f=a+b*xs[i]; ssr+=(y-f)**2; sst+=(y-ym)**2; });
  return {slope:b, r2: sst>0? Math.max(0,1-ssr/sst):0, last:ys[n-1]};

  const cut = Date.now()-48*3.6e6;

  const fit = regress(recent); if(!fit) return null;

  const hi = useStage? w.smax : (w.fmax!=null?w.fmax:(w.fopt!=null?w.fopt*1.35:null));

  else if(hi!=null && v>hi && sl<0){ const h=hrsTo(hi); if(h>0&&h<24*14){eta=h; event='in';} }
  else if(lo!=null&&(hi==null||v<=hi)&&v>=lo&&sl<0){ const h=hrsTo(lo); if(h>0&&h<24*14){eta=h; event='out';} }
  else if(hi!=null&&v<=hi&&(lo==null||v>=lo)&&sl>0){ const h=hrsTo(hi); if(h>0&&h<24*14){eta=h; event='out';} }
  const etaTxt = eta==null?null:(eta<30? Math.round(eta)+' hours' : (eta/24).toFixed(1)+' days');
  return {trendTxt, slope:sl, conf, eta, etaTxt, event, useStage, unit, r2:fit.r2};
}
function predText(w,p){

state.srcNote = state.srcNote||{};
async function fetchTextChain(url){
  const tries=[url, 'https://corsproxy.io/?url='+encodeURIComponent(url), 'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  for(const u of tries){ try{ const r=await fetch(u); if(!r.ok) continue; const t=await r.text(); if(t&&t.length>40) return t; }catch(e){} }
  return null;
}
function parseUSBRHead(txt){
  /* USBR Hydromet v1 CSV: header 'DateTime,beno_gh,beno_hj,beno_q,...,ceno_qc,...,arno_qc,...'
     Flow columns: beno_q (river), ceno_qc / arno_qc (canal diversions). Position-safe split. */
  const out=[]; if(!txt) return out;
  const lines=txt.split(/\r?\n/);
  let hdr=null;
  for(const ln of lines){ if(/datetime/i.test(ln)||(/date/i.test(ln)&&/beno|ceno|arno/i.test(ln))){
    hdr=ln.split(',').map(s=>s.trim().toLowerCase()); break; } }
  if(!hdr) return out;
  const col=(...names)=>{ for(const n of names){ const k=hdr.indexOf(n); if(k>0) return k; }
    return hdr.findIndex(h=>names.some(n=>h===n)); };
  const bi=col('beno_q','beno_qr','beno_qd'), ci=col('ceno_qc','ceno_q','ceno_qr'), ai=col('arno_qc','arno_q','arno_qr');
  if(bi<1||ci<1||ai<1) return out;
  for(const ln of lines){
    const c=ln.split(',');
    if(c.length<=Math.max(bi,ci,ai)) continue;
    const ds=c[0].trim(); if(!/\d{1,2}:\d{2}/.test(ds)) continue;
    const t=new Date(ds.replace(/(\d{2})\/(\d{2})\/(\d{4})/,'$3-$1-$2')).getTime();
    if(isNaN(t)) continue;
    const b=parseFloat(c[bi]), cc=parseFloat(c[ci]), aa=parseFloat(c[ai]);
    if([b,cc,aa].some(v=>isNaN(v)||v<-900)) continue;
    /* 101.5 cfs: calibrated channel/seepage loss, Benham Falls -> head of park */
    out.push({t, v:Math.max(0, b-cc-aa-101.5), param:'00060'});
  }
  out.sort((x,y)=>x.t-y.t); return out;
}
async function fetchGreenWaveSeries(days){
  /* FlowState Head-of-Park engine: flow at the Bend Whitewater Park =
     Benham Falls inflow minus the two canal diversions above the wave.
     Tier 1: FlowState's self-hosted relay (head.json, refreshed by our
     scheduled GitHub Action). Tier 2: compute live from USBR Hydromet. */
  try{ if(location.protocol.indexOf('http')===0){
    const r=await fetch('./head.json?t='+Math.floor(Date.now()/6e5));
    if(r.ok){ const j=await r.json();
      if(j.temp_c!=null){ const rec=state.live['14070500']=state.live['14070500']||{}; rec.temp=j.temp_c; }
      const pts=(j.series||[]).map(p=>({t:p[0],v:p[1],param:'00060'})).filter(p=>p.v!=null&&!isNaN(p.t));
      const cut=Date.now()-days*864e5; const f=pts.filter(p=>p.t>=cut);
      const age=Date.now()-(f.length?f[f.length-1].t:0);
      if(f.length>=2 && age < 48*3.6e6)
        return {pts:f, src:'FlowState Head-of-Park engine · '+(age<6*3.6e6?'live relay':'relay · last reading '+Math.round(age/3.6e6)+'h ago')};
    } } }catch(e){}
  const pts=parseUSBRHead(await fetchTextChain('https://www.usbr.gov/pn-bin/v1/instant.pl?list=beno,ceno,arno&back='+days+'&format=csv'));
  if(pts.length>=2) return {pts, src:'FlowState Head-of-Park engine · USBR direct'};
  return null;
}
async function fetchCurrent(gids){
  const usgs = [...new Set(gids.filter(g=>/^\d{7,15}$/.test(g)))];
  for(let i=0;i<usgs.length;i+=30){
    const chunk=usgs.slice(i,i+30);
    try{
      const r=await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${chunk.join(',')}&parameterCd=00060,00065,00010&siteStatus=all`);
      if(!r.ok) throw new Error('USGS HTTP '+r.status);
      const j=await r.json();
      (j.value.timeSeries||[]).forEach(ts=>{
        const sid=ts.sourceInfo.siteCode[0].value, p=ts.variable.variableCode[0].value;
        const vv=ts.values[0]&&ts.values[0].value[0]; if(!vv) return;
        const num=parseFloat(vv.value); if(isNaN(num)||num<=-99999) return;
        const tms=new Date(vv.dateTime).getTime();
        if(Date.now()-tms > 30*864e5) return; /* ignore stale/decommissioned gauge readings */
        const rec = state.live[sid] = state.live[sid]||{};
        if(p==='00060') rec.flow=num; if(p==='00065') rec.stage=num; if(p==='00010') rec.temp=num;
        rec.t = tms;
      });
      state.liveOk=Date.now(); state.liveErr=null;
    }catch(e){ state.liveErr=(e&&e.message)||String(e); console.warn('USGS fetch failed',e); }
  }
  for(const g of gids){ const wv=WAVES.find(x=>x.gid===g&&x.usbr); if(!wv) continue;
    try{ const res=await fetchGreenWaveSeries(2);
      if(res&&res.pts.length){ const last=res.pts[res.pts.length-1];
        if(Date.now()-last.t<=30*864e5){ const rec=state.live[g]=state.live[g]||{};
          rec.flow=last.v; rec.t=last.t; rec.src='head'; state.liveOk=Date.now(); state.srcNote[g]=res.src; continue; } }
      state.srcNote[g]='Head-of-park sources unreachable — showing NOAA below-Bend gauge (undercounts the wave)';
    }catch(e){ state.srcNote[g]='Head-of-park fetch error — showing NOAA below-Bend gauge (undercounts the wave)'; }
  }
  const lids={}; gids.forEach(g=>{ const wv=WAVES.find(x=>x.gid===g&&x.nws); if(wv && !(state.live[g]&&state.live[g].src==='head')) lids[wv.nws]=g; });
  for(const lid in lids){
    try{
      const r=await fetch('https://api.water.noaa.gov/nwps/v1/gauges/'+lid);
      if(!r.ok) throw new Error('NWPS HTTP '+r.status);
      const j=await r.json(); const o=j&&j.status&&j.status.observed;
      if(o&&o.validTime){ const t=new Date(o.validTime).getTime();
        if(Date.now()-t<=30*864e5){ const rec=state.live[lids[lid]]=state.live[lids[lid]]||{};
          if(o.primary!=null&&o.primary>-999) rec.stage=o.primary;
          if(o.secondary!=null&&o.secondary>-999) rec.flow=(o.secondaryUnit==='kcfs')? o.secondary*1000 : o.secondary;
          rec.t=t; state.liveOk=Date.now();
          state.srcNote[lids[lid]] = (state.srcNote[lids[lid]]&&state.srcNote[lids[lid]].includes('undercount'))? 'NOAA below-Bend gauge — undercounts the wave · '+lid : 'NOAA NWPS · '+lid; } }
    }catch(e){ console.warn('NWPS fetch failed',e); }
  }
}
async function fetchSeries(gid, days=7){
  const wu=WAVES.find(x=>x.gid===gid&&x.usbr);
  if(wu){ try{ const res=await fetchGreenWaveSeries(days);
      if(res&&res.pts.length>=3){ state.series[gid]=res.pts;
        const last=res.pts[res.pts.length-1];
        if(Date.now()-last.t < 4*3.6e6){ const rec=state.live[gid]=state.live[gid]||{};
          rec.flow=last.v; rec.t=last.t; rec.src='head'; state.liveOk=Date.now(); state.srcNote[gid]=res.src; }
        return res.pts; } }catch(e){} }
  const wv=WAVES.find(x=>x.gid===gid&&x.nws);
  if(wv){
    try{
      const r=await fetch('https://api.water.noaa.gov/nwps/v1/gauges/'+wv.nws+'/stageflow/observed');
      if(!r.ok) throw new Error('NWPS HTTP '+r.status);
      const j=await r.json(); const out=[]; const kcfs=(j.secondaryUnits==='kcfs');
      const cut=Date.now()-days*864e5;
      (j.data||[]).forEach(d=>{ const t=new Date(d.validTime).getTime(); if(t<cut) return;
        if(d.secondary!=null&&d.secondary>-999) out.push({t,v:kcfs?d.secondary*1000:d.secondary,param:'00060'});
        if(d.primary!=null&&d.primary>-999) out.push({t,v:d.primary,param:'00065'});
      });
      out.sort((a,b)=>a.t-b.t); state.series[gid]=out; return out;
    }catch(e){ console.warn('NWPS series fail',e); return null; }
  }
  if(!/^\d{7,15}$/.test(gid)) return null;
  try{
    const r=await fetch(`https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${gid}&parameterCd=00060,00065&period=P${days}D`);
    if(!r.ok) throw new Error('USGS HTTP '+r.status);
    const j=await r.json(); const out=[];
    (j.value.timeSeries||[]).forEach(ts=>{
      const p=ts.variable.variableCode[0].value;
      (ts.values[0]?ts.values[0].value:[]).forEach(vv=>{
        const num=parseFloat(vv.value); if(isNaN(num)||num<=-99999) return;
        out.push({t:new Date(vv.dateTime).getTime(), v:num, param:p});
      });
    });
    out.sort((a,b)=>a.t-b.t); state.series[gid]=out; return out;
  }catch(e){ console.warn('series fail',e); return null; }
}

async function hydrateForecast(){
  const f=featuredWave();
  // weather
  if(f.lat&&f.lon){ fetchWeather(f.lat,f.lon).then(w=>{ const el=$('#wx-stat'); if(!el||!w||!w.current) return;
    const t=state.units==='cms'? w.current.temperature_2m.toFixed(0)+'°C' : (w.current.temperature_2m*9/5+32).toFixed(0)+'°F';
    el.innerHTML=`<b class="num">${t}</b><span>${(WMO[w.current.weather_code]||'')} · ${Math.round(w.current.wind_speed_10m)} km/h</span>`; }); }
  // featured prediction
  if(f.gid){ if(!state.series[f.gid]) await fetchSeries(f.gid);
    const el=$('#featured-pred'); if(el){ const p=predict(f); el.innerHTML= p? predText(f,p) : '<span class="tiny">Not enough recent gauge data for a trend.</span>'; } }
  // best window: scan favorites (or a sample of IN waves)
  const cands=[...state.favs].map(i=>WAVES[i]).filter(w=>w&&w.gid&&w.usgs);
  const pool = cands.length? cands : WAVES.filter(w=>w.gid&&w.usgs&&assess(w).code!=='NA').slice(0,6);
  for(const w of pool.slice(0,6)){ if(!state.series[w.gid]) await fetchSeries(w.gid); }
  const el=$('#bestwindow'); if(!el) return;
  const now = pool.filter(w=>assess(w).code==='IN');
  const soon = pool.map(w=>({w,p:predict(w)})).filter(x=>x.p&&x.p.event==='in').sort((a,b)=>a.p.eta-b.p.eta);
  let html='';
  if(now.length) html+=`<div style="font-size:14.5px;line-height:1.6">🌊 <b>Surf now:</b> ${now.map(w=>`<a href="#" onclick="openSheet(${w.id});return false" style="color:var(--river-d)">${esc(w.name)}</a>`).join(' · ')}</div>`;
  if(soon.length) html+=`<div style="font-size:14px;line-height:1.7;margin-top:${now.length?'8px':'0'}">◷ <b>Coming in:</b> ${soon.slice(0,3).map(x=>`${esc(x.w.name)} in ~${x.p.etaTxt}`).join(' · ')}</div>`;
  if(!html) html=`<div class="sub">Nothing in your watch list is in or trending in right now. Season matters — check each spot's window, and add more favorites to widen the net.</div>`;
  el.innerHTML=html;
  curlAnimate('curl-hero', fillLevel(featuredWave()), 0.55);
  render_minisRefresh();
}

function spotListHTML(){
  let list=WAVES.filter(w=>!w.locked);
  const q=exploreFilter.q.toLowerCase();
  if(q) list=list.filter(w=>[w.name,w.river,w.town,w.st,stateName[w.st],w.aka].join(' ').toLowerCase().includes(q));
  if(exploreFilter.st!=='all') list=list.filter(w=>w.st===exploreFilter.st);
  if(exploreFilter.status==='fav') list=list.filter(w=>state.favs.has(w.id));
  else if(exploreFilter.status!=='all') list=list.filter(w=>{const c=assess(w).code; return exploreFilter.status==='IN'? (c==='IN'||c==='PRIME') : c===exploreFilter.status;});
  if(state.geo) list.sort((a,b)=>((a.lat?dist(state.geo.lat,state.geo.lon,a.lat,a.lon):1e9))-((b.lat?dist(state.geo.lat,state.geo.lon,b.lat,b.lon):1e9)));
  if(!list.length) return `<div class="card"><div class="sub">${exploreFilter.status==='IN'? 'No waves are IN right now — live data may still be loading, or the rivers are resting. Tap ALL to browse every wave.' : 'No waves match. Loosen the filters — the river always has more to give.'}</div></div>`;
  if(state.geo || exploreFilter.q) return list.slice(0,80).map(waveCard).join('')+(list.length>80?`<div class="section-note" style="text-align:center">Showing 80 of ${list.length} — refine your search.</div>`:'');
  const groups={};
  list.forEach(w=>{ const k=w.st||'—'; (groups[k]=groups[k]||[]).push(w); });
  const keys=Object.keys(groups).sort((a,b)=>{
    const ca=groups[a][0].co, cb=groups[b][0].co;
    if(ca!==cb) return ca==='USA'?-1:1;
    return (stateName[a]||a).localeCompare(stateName[b]||b);
  });
  return keys.map(k=>stateHeader(k,groups[k].length)+groups[k].map(waveCard).join('')).join('');
}

async function hydrateSheet(w){

    const sk=$('#sheetSky'); if(sk) sk.textContent=(WMO[x.current.weather_code]||'—'); });
  if(w.hours){ const s=sessionOpen(); const el=$('#sheetPred');
    if(el) el.innerHTML = `<b>${s.open?'SHRED READY ✓ — sessions running':'DRY LAND — not operating today'}</b><br>${s.phase}. Open season April–October; closed for winter from November. Book a session below.`;
    curlAnimate('curl-sheet', s.open?0.95:0.15, 0.55); return; }
  if(!w.gid){ const el=$('#sheetPred'); if(el) el.innerHTML='<span class="tiny">No gauge is linked to this wave yet — predictions unavailable. Local knowledge and eyes on the water are your gauge here.</span>'; drawHydro(w,null); curlAnimate('curl-sheet',null,0.55); return; }
  if(!state.live[w.gid]) await fetchCurrent([w.gid]);
  if(!state.series[w.gid]) await fetchSeries(w.gid);
  const p=predict(w); const el=$('#sheetPred');
  if(el) el.innerHTML = p? predText(w,p) : '<span class="tiny">Not enough recent gauge data to compute a trend.</span>';
  drawHydro(w, state.series[w.gid]);
  curlAnimate('curl-sheet', fillLevel(w), 0.55);
  const lvN=state.live[w.gid];
  const fEl=$('#sheetFlow'); if(fEl&&lvN&&lvN.flow!=null) fEl.textContent=fmtFlow(lvN.flow).replace(/ (cfs|m³\/s)/,'');
  const cEl=$('#sheetChip'); if(cEl) cEl.innerHTML=statusChip(w);
}
function drawHydro(w, series){
  const cv=$('#hydro'); if(!cv) return; const note=$('#hydroNote');
  const dpr=window.devicePixelRatio||1; const cw=cv.clientWidth||360, ch=170;
  cv.width=cw*dpr; cv.height=ch*dpr; const g=cv.getContext('2d'); g.scale(dpr,dpr);
  g.clearRect(0,0,cw,ch);
  const useStage=(w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
  const pts=(series||[]).filter(p=>p.param===(useStage?'00065':'00060'));
  if(!pts.length){ g.fillStyle='#7E938B'; g.font='13px sans-serif'; g.textAlign='center'; g.fillText('No recent gauge series available',cw/2,ch/2); if(note)note.textContent=''; return; }
  const t0=pts[0].t, t1=pts[pts.length-1].t + (t1_ext=>0)(0);
  const p=predict(w); const ext = p&&p.eta? Math.min(p.eta,96)*3.6e6 : 0;
  const tmax=pts[pts.length-1].t+ext;
  const lo=useStage?w.smin:(w.fmin!=null?w.fmin:(w.fopt?w.fopt*0.75:null));
  const hi=useStage?w.smax:(w.fmax!=null?w.fmax:(w.fopt?w.fopt*1.35:null));
  let vmin=Math.min(...pts.map(p=>p.v)), vmax=Math.max(...pts.map(p=>p.v));
  if(lo!=null){vmin=Math.min(vmin,lo);vmax=Math.max(vmax,lo);} if(hi!=null){vmin=Math.min(vmin,hi);vmax=Math.max(vmax,hi);}
  const pad=(vmax-vmin)*0.15||1; vmin-=pad; vmax+=pad;
  const X=t=>28+(t-t0)/(tmax-t0)*(cw-40), Y=v=>10+(1-(v-vmin)/(vmax-vmin))*(ch-38);
  // band
  if(lo!=null||hi!=null){ const yTop=Y(hi!=null?hi:vmax), yBot=Y(lo!=null?lo:vmin);
    g.fillStyle='rgba(95,143,134,.18)'; g.fillRect(28,yTop,cw-40,yBot-yTop);
    g.strokeStyle='rgba(159,217,198,.45)'; g.setLineDash([4,4]); g.beginPath();
    if(hi!=null){g.moveTo(28,yTop);g.lineTo(cw-12,yTop);} if(lo!=null){g.moveTo(28,yBot);g.lineTo(cw-12,yBot);} g.stroke(); g.setLineDash([]); }
  // area+line
  g.beginPath(); pts.forEach((pp,i)=>{ const x=X(pp.t),y=Y(pp.v); i?g.lineTo(x,y):g.moveTo(x,y); });
  g.strokeStyle='#9FD9C6'; g.lineWidth=2.2; g.lineJoin='round'; g.stroke();
  g.lineTo(X(pts[pts.length-1].t),ch-28); g.lineTo(X(t0),ch-28); g.closePath();
  const grad=g.createLinearGradient(0,0,0,ch); grad.addColorStop(0,'rgba(95,143,134,.35)'); grad.addColorStop(1,'rgba(95,143,134,.04)');
  g.fillStyle=grad; g.fill();
  // trend extension
  if(p&&ext>0){ const last=pts[pts.length-1];
    g.beginPath(); g.moveTo(X(last.t),Y(last.v)); g.lineTo(X(last.t+ext),Y(last.v+p.slope*(ext/3.6e6)));
    g.strokeStyle='rgba(168,144,92,.95)'; g.setLineDash([6,5]); g.lineWidth=2; g.stroke(); g.setLineDash([]); }
  // now dot
  const last=pts[pts.length-1];
  g.beginPath(); g.arc(X(last.t),Y(last.v),4.5,0,7); g.fillStyle='#9FD9C6'; g.fill();
  g.beginPath(); g.arc(X(last.t),Y(last.v),8,0,7); g.strokeStyle='rgba(159,217,198,.3)'; g.stroke();
  // labels
  g.fillStyle='#7E938B'; g.font='10.5px sans-serif'; g.textAlign='left';
  g.fillText((useStage?vmax.toFixed(1)+' ft':Math.round(vmax).toLocaleString()),4,16);
  g.fillText((useStage?vmin.toFixed(1)+' ft':Math.round(vmin).toLocaleString()),4,ch-30);
  g.textAlign='center';
  for(let d=0;d<=7;d+=2){ const t=t0+d*864e5; if(t>tmax)break; g.fillText(new Date(t).toLocaleDateString(undefined,{weekday:'short'}),X(t),ch-14); }
  if(note) note.textContent=`Latest: ${useStage? last.v+' ft':fmtFlow(last.v)} at ${new Date(last.t).toLocaleString(undefined,{weekday:'short',hour:'numeric',minute:'2-digit'})} · USGS provisional data`;
}

  const wsvg='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18C5 8 11 4 16 4c-3 3-4 6-3 8 3-2 6-1 8 2-6-1-12 1-18 4z"/></svg>';

  });

/* ============ FIN KEYS v2 · server-keyed vault (FlowState 3.1) ============ */
const FK_RNAME={pnw:'Pacific Northwest',norcal:'NorCal & Sierra',rkn:'Northern Rockies',rks:'Southern Rockies & Desert',mw:'Midwest',south:'The South',east:'Appalachia & East',canw:'Western Canada',cane:'Eastern Canada',eur:'Europe'};
const FK_REGION={OR:'pnw',WA:'pnw',CA:'norcal',NV:'norcal',ID:'rkn',MT:'rkn',WY:'rkn',CO:'rks',UT:'rks',NM:'rks',AZ:'rks',IA:'mw',WI:'mw',MI:'mw',OH:'mw',IN:'mw',OK:'south',TX:'south',AR:'south',AL:'south',GA:'south',TN:'south',NC:'south',WV:'east',VA:'east',MD:'east',PA:'east',MA:'east',RI:'east',ME:'east',DC:'east',BC:'canw',AB:'canw',NT:'canw',QC:'cane',ON:'cane',MB:'cane',DE:'eur'};
const FK_VERIFY_KM=1.609; // 1 mile

/* ---- crypto ---- */
const FK_B32='0123456789bcdefghjkmnpqrstuvwxyz';
function fkGh(lat,lon,prec=6){let idx=0,bit=0,even=true,g='';let la=[-90,90],lo=[-180,180];
 while(g.length<prec){ if(even){const m=(lo[0]+lo[1])/2; if(lon>=m){idx=idx*2+1;lo[0]=m}else{idx*=2;lo[1]=m}}
  else{const m=(la[0]+la[1])/2; if(lat>=m){idx=idx*2+1;la[0]=m}else{idx*=2;la[1]=m}}
  even=!even; if(++bit==5){g+=FK_B32[idx];bit=0;idx=0}} return g;}
function fkCells(lat,lon){ const dla=180/Math.pow(2,15), dlo=360/Math.pow(2,15); const out=new Set();
 for(let i=-1;i<=1;i++) for(let j=-1;j<=1;j++) out.add(fkGh(lat+i*dla,lon+j*dlo,6)); return [...out]; }
async function fkKey(secret){ const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(secret),'PBKDF2',false,['deriveKey']);
 return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('FlowState-finkey-v1'),iterations:60000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']); }
async function fkOpen(b64,secret){ try{ const raw=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},await fkKey(secret),raw.slice(12));
 return JSON.parse(new TextDecoder().decode(pt)); }catch(e){ return null; } }

/* ---- server ---- */
async function fkServer(body){ try{
 const r=await fetch(SB_URL+'/functions/v1/finkeys',{method:'POST',
  headers:{'Content-Type':'application/json','apikey':SB_KEY},body:JSON.stringify(body)});
 return await r.json(); }catch(e){ return null; } }
async function fkFetchStatus(){ try{
 const r=await fetch(SB_URL+'/rest/v1/egg_status?select=*',{headers:{apikey:SB_KEY}});
 const rows=await r.json(); if(Array.isArray(rows)){ state.eggStatus={}; rows.forEach(x=>state.eggStatus[x.region]=x); } }catch(e){} }

/* ---- state ---- */
function fkLoad(){ const p=userNS(); state.fin=store.get(p+'fin',{keys:{},unlocked:{},secrets:{},pending:[],progress:{}});
 state.fin.secrets=state.fin.secrets||{}; state.fin.pending=state.fin.pending||[]; state.fin.progress=state.fin.progress||{};
 Object.entries(state.fin.unlocked||{}).forEach(([id,pay])=>fkApply(+id,pay,true)); }
function fkApply(id,pay,silent){ const w=WAVES[id]; if(!w) return;
 Object.assign(w,pay); w.locked=false; w.vis='egg-open'; state.fin.unlocked[id]=pay;
 if(!silent) toast('🔑 UNLOCKED — '+pay.name); }
const _fk_persist=persist; persist=function(){ _fk_persist(); try{store.set(userNS()+'fin',state.fin);}catch(e){} };
const _fk_loadUserSpace=loadUserSpace; loadUserSpace=function(){ _fk_loadUserSpace(); fkLoad(); };

/* ---- unlocks ---- */
function fkLockOk(v){ if(!state.fin.keys['rk_'+v.region]) return false; if(v.hw&&!state.fin.keys.hw) return false; return true; }
async function fkTryRegion(region){ const sec=state.fin.secrets[region]; if(!sec) return 0; let n=0;
 for(const v of EGG_VAULT){ if(v.region!==region) continue; const w=WAVES[v.id];
   if(!w||!w.locked||!fkLockOk(v)) continue;
   const p=await fkOpen(v.r,'r2:'+region+':'+sec); if(p){ fkApply(v.id,p); n++; } }
 if(n){ persist(); render(); } return n; }
async function fkGrant(region,secret){ if(!secret) return;
 state.fin.secrets[region]=secret;
 if(!state.fin.keys['rk_'+region]){ state.fin.keys['rk_'+region]=Date.now();
   setTimeout(()=>toast('🔑 '+FK_RNAME[region].toUpperCase()+' FIN KEY MINTED'),1500); }
 await fkTryRegion(region); persist(); }
async function fkProximity(lat,lon,quiet){ const cells=fkCells(lat,lon); let n=0;
 for(const v of EGG_VAULT){ if(!v.g) continue; const w=WAVES[v.id]; if(!w||!w.locked) continue;
   for(const c of cells){ const p=await fkOpen(v.g,'g1:'+c); if(p){ fkApply(v.id,p); n++; break; } } }
 if(n){ persist(); render(); } else if(!quiet) toast('No hidden waves within reach here');
 return n; }
function fkScan(){ toast('Scanning this stretch of river…');
 fkGeo(p=>{ state.geo={lat:p.coords.latitude,lon:p.coords.longitude}; fkProximity(p.coords.latitude,p.coords.longitude,false); }); }

/* ---- verified check-ins ---- */
async function fkSubmit(waveId,lat,lon){ const email=state.profile&&state.profile.email; if(!email) return null;
 const _w0=WAVES[waveId]; const _lv0=_w0&&_w0.gid?state.live[_w0.gid]:null; const _a0=_w0?assess(_w0):null;
 const _tmp=_lv0&&_lv0.temp!=null?_lv0.temp:null; const _inw=_a0&&_a0.code==='IN'?1:0;
 const res=await fkServer({action:'checkin',email,wave:waveId,lat,lon,tmp:_tmp,inw:_inw});
 if(!res){ state.fin.pending.push({wave:waveId,lat,lon,t:Date.now()}); persist();
   setTimeout(()=>toast('Offline — check-in will verify when you reconnect'),900); return null; }
 if(res.verified){ state.fin.progress[res.region]=res.progress;
   if(!res.already){ state.fin.serverLog=state.fin.serverLog||[]; state.fin.serverLog.push({wave:waveId,region:res.region,t:Date.now(),hr:new Date().getHours(),tmp:_tmp,inw:_inw}); }
   const hr=new Date().getHours();
   if(hr<7&&!state.fin.keys.dawn){ state.fin.keys.dawn=Date.now(); setTimeout(()=>toast('🔑 DAWN PATROL FIN KEY MINTED'),2400); }
   const w=WAVES[waveId]; const a=w?assess(w):null;
   const hi=w? ((w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null)? w.smax : (w.fmax!=null?w.fmax:(w.fopt?w.fopt*1.35:null))) : null;
   if(hi!=null&&a&&a.val!=null&&a.val>=hi*0.85&&!state.fin.keys.hw){ state.fin.keys.hw=Date.now();
     setTimeout(()=>toast('🔑 HIGH WATER FIN KEY MINTED'),2400);
     Object.keys(state.fin.secrets).forEach(r=>fkTryRegion(r)); }
   if(res.secret) await fkGrant(res.region,res.secret);
   else setTimeout(()=>toast('✓ VERIFIED — '+Math.min(res.progress,2)+'/2 here · '+Math.min(fkTotalKeys(),5)+'/5 fin keys total'),900);
   persist();
 } else if(res.reason){ setTimeout(()=>toast('Check-in logged (unverified — '+res.reason+')'),900); }
 return res; }
const _fk_toggleCheckin=toggleCheckin; toggleCheckin=function(id,btn){
 const was=!!state.checkins[id];
 if(was){ _fk_toggleCheckin(id,btn); fkLog('checkout',null,id); return; }
 const w=WAVES[id]; if(!w||w.locked) return;
 if(w.lat==null){ _fk_toggleCheckin(id,btn); fkLog('checkin_honor',null,id); return; }
 toast('Confirming you\u2019re at the wave\u2026');
 fkGeo(p=>{
   const d=fkNearest(w,p.coords.latitude,p.coords.longitude);
   if(d>FK_VERIFY_KM){
     toast('Too far out \u2014 check-ins only work within 1 mile of the wave ('+(d<100?d.toFixed(1):Math.round(d))+' km away)');
     fkLog('checkin_rejected',null,id,{km:Math.round(d*10)/10}); return; }
   _fk_toggleCheckin(id,btn); fkLog('tap','checkin',id);
   if(state.profile&&state.profile.email&&w.vis==='public'){ fkSubmit(id,p.coords.latitude,p.coords.longitude).then(()=>fkMissionCheck()); }
   else if(!state.profile){ setTimeout(()=>toast('Sign in (Profile) to earn Fin Keys from check-ins'),900); }
 }); };
async function fkFlushPending(){ if(!state.fin.pending.length||!state.profile) return;
 const q=state.fin.pending.splice(0); for(const c of q) await fkSubmit(c.wave,c.lat,c.lon); persist(); }
async function fkSync(){ const email=state.profile&&state.profile.email;
 if(!email){ toast('Sign in first — Profile page'); return; }
 toast('Syncing with the vault…');
 const res=await fkServer({action:'progress',email,crew:(state.crew||[]).filter(c=>!c.off).map(c=>c.email).slice(0,20)});
 if(!res){ toast('Could not reach the vault — try again later'); return; }
 state.fin.progress=res.progress||{};
 if(res.crew_sync!=null) state.fin.crewSync=res.crew_sync;
 if(Array.isArray(res.checkins)) state.fin.serverLog=res.checkins.map(c=>({wave:c.wave_id,region:c.region,t:new Date(c.created_at).getTime(),hr:new Date(c.created_at).getHours(),tmp:c.temp_c!=null?c.temp_c:null,inw:c.in_window?1:0}));
 fkMissionCheck();

/* ---- hardened geolocation ---- */
function fkGeo(cb,optMsg){ if(!navigator.geolocation){ toast('GPS unavailable on this device/browser'); return; }
 navigator.geolocation.getCurrentPosition(p=>cb(p),err=>{
  const m=(err&&err.code===1)?'Location denied \u2014 iPhone: Settings \u2192 Privacy & Security \u2192 Location Services \u2192 Safari Websites \u2192 While Using; and Safari aA menu \u2192 Website Settings \u2192 Location \u2192 Allow'
   :(err&&err.code===2)?'No GPS signal \u2014 step outside or away from cover and retry'
   :'GPS timed out \u2014 open sky helps; try again';
  toast(optMsg||m); },{enableHighAccuracy:true,timeout:15000,maximumAge:20000}); }
async function fkGeoTest(){ let st='unknown';
 try{ if(navigator.permissions&&navigator.permissions.query){ st=(await navigator.permissions.query({name:'geolocation'})).state; } }catch(e){}
 if(st==='denied'){ toast('Location is BLOCKED at the iOS level \u2014 Settings \u2192 Privacy & Security \u2192 Location Services \u2192 Safari Websites \u2192 While Using. Then in Safari on this site: aA menu \u2192 Website Settings \u2192 Location \u2192 Allow.'); return; }
 toast('Testing GPS (permission: '+st+')\u2026');
 fkGeo(p=>{ toast('\u2713 GPS OK \u2014 fix within \u00B1'+Math.round(p.coords.accuracy)+' m'+(p.coords.accuracy>200?' \u2014 enable Precise Location for reliable check-ins':'')); state.geo={lat:p.coords.latitude,lon:p.coords.longitude}; }); }

let fkQRStream=null, fkQRRun=false;
function fkQRStop(){ fkQRRun=false;
 if(fkQRStream){ try{ fkQRStream.getTracks().forEach(t=>t.stop()); }catch(e){} fkQRStream=null; } }
function fkEnsureJsQR(cb){ if(window.jsQR){cb();return;}
 const s=document.createElement('script'); s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
 s.onload=cb; s.onerror=()=>toast('Scanner needs a connection \u2014 try again with signal'); document.head.appendChild(s); }
function fkQRScan(){ if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ toast('Camera not available in this browser'); return; }
 fkEnsureJsQR(async()=>{ try{
  fkQRStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
 }catch(e){ toast('Camera permission needed \u2014 allow it and try again'); return; }

 $('#sheet').classList.add('open');
 const v=document.getElementById('fkQRVideo'); v.srcObject=fkQRStream; await v.play().catch(()=>{});
 const c=document.createElement('canvas'); const ctx=c.getContext('2d',{willReadFrequently:true});
 fkQRRun=true;
 (function scan(){ if(!fkQRRun) return;
  if(v.readyState>=2&&v.videoWidth){ c.width=v.videoWidth; c.height=v.videoHeight;
   ctx.drawImage(v,0,0);
   try{ const code=jsQR(ctx.getImageData(0,0,c.width,c.height).data,c.width,c.height);
    if(code&&code.data){ const m=code.data.match(/[?&]crew=([^&]+)/);
     if(m){ const em=decodeURIComponent(m[1]).trim().toLowerCase();

      fkCrewAddFromLink(em, nm?decodeURIComponent(nm):null); return; } } }catch(e){} }
  requestAnimationFrame(scan); })(); }); }

 const r=await fkDM({action:'inbox'}); if(!r||!Array.isArray(r.messages)){ if(!quiet) box.innerHTML='<span class="tiny">Could not load.</span>'; return; }
 const me=state.profile.email;
 const th=r.messages.filter(m=>m.from_email===peer||m.to_email===peer).reverse();
 state.dmCache=r.messages;
 box.innerHTML=th.length?th.map(m=>{ const mine=m.from_email===me;
  return `<div style="align-self:${mine?'flex-end':'flex-start'};max-width:82%;padding:8px 11px;border:1px solid ${mine?'#7E9A6E':'var(--steel)'};background:${mine?'#3d5741':'var(--panel2)'};font-size:12.5px;line-height:1.5">${esc(m.body)}<div class="tiny" style="margin-top:3px">${timeAgo(new Date(m.created_at).getTime())}</div></div>`;}).join('')
  :'<span class="tiny">No messages yet \u2014 start the stoke.</span>';
 box.scrollTop=box.scrollHeight;
 fkDM({action:'read',peer}).then(()=>{ state.dmUnread=null; fkDMPoll(); }); }
async function fkThreadSend(peer){ const ta=document.getElementById('fkDMmsg');
 const msg=(ta.value||'').trim(); if(!msg) return; ta.value='';
 const r=await fkDM({action:'send',to:peer,body:msg});
 if(r&&r.ok){ fkThreadLoad(peer,true); fkLog('dm_send','profile'); }
 else toast(r&&r.reason==='not a member'?'They have not signed into FlowState yet \u2014 send them your Crew QR':'Send failed \u2014 try again'); }
function fkInboxCard(){ if(!state.profile) return '';
 const msgs=state.dmCache||[]; const me=state.profile.email; const peers={};
 msgs.forEach(m=>{ const p=m.from_email===me?m.to_email:m.from_email;
  if(!peers[p]) peers[p]={last:m,unread:0};
  if(m.to_email===me&&!m.read) peers[p].unread++; });
 const list=Object.entries(peers).sort((a,b)=>new Date(b[1].last.created_at)-new Date(a[1].last.created_at)).slice(0,8);
 return `<div class="card fadein"><h3 style="margin-bottom:6px">\uD83D\uDCAC Messages${state.dmUnread?` \u00B7 <span style="color:var(--brass-l)">${state.dmUnread} new</span>`:''}</h3>
  <div class="sub">Direct lines to your crew \u2014 lives inside FlowState, checked while the app is open.</div>
  ${list.length?`<div style="margin-top:8px">${list.map(([p,v])=>`<div class="kv" style="cursor:pointer" onclick="fkThread('${p}')"><span class="k">${v.unread?'\uD83D\uDD35 ':''}${esc(fkPeerName(p))}</span><span class="v tiny">${esc(v.last.body.slice(0,44))}${v.last.body.length>44?'\u2026':''}</span></div>`).join('')}</div>`
  :'<div class="tiny" style="margin-top:8px">No conversations yet \u2014 message a crew member below, or Call Up the Crew from any wave card.</div>'}
 </div>`; }


/* ---- swipe-down-to-close (grab-bar zone, all sheets) ---- */
(function(){ const panel=document.getElementById('sheetPanel'); if(!panel) return;
 let sy=null, dy=0;
 panel.addEventListener('touchstart',e=>{ 
   const top=panel.getBoundingClientRect().top;
   if(e.touches[0].clientY-top<=52){ sy=e.touches[0].clientY; dy=0; panel.style.transition='none'; }
   else sy=null; },{passive:true});
 panel.addEventListener('touchmove',e=>{ if(sy==null) return;
   dy=e.touches[0].clientY-sy; if(dy<0) dy=0;
   panel.style.transform='translateY('+dy+'px)'; },{passive:true});
 panel.addEventListener('touchend',()=>{ if(sy==null) return;
   panel.style.transition='';
   if(dy>90){ panel.style.transform=''; closeSheet(); }
   else panel.style.transform='';
   sy=null; dy=0; },{passive:true});
})();

/* ---- welcome email (once per address, server-side dedupe) ---- */
function fkWelcome(email,name){ try{ setTimeout(()=>{ fetch(SB_URL+'/functions/v1/welcome',{method:'POST',
 headers:{'Content-Type':'application/json','apikey':SB_KEY},
 body:JSON.stringify({email:email,name:name||''})}).catch(()=>{}); },2500); }catch(e){} }
function fkGoogle(){ fkLog('tap','google_signin');
 location.href=SB_URL+'/auth/v1/authorize?provider=google&redirect_to='+encodeURIComponent(location.origin+location.pathname); }
function fkAuthHash(){ try{
 if(!location.hash||location.hash.indexOf('access_token=')<0){
   if(location.hash&&location.hash.indexOf('error')>=0){ const q=new URLSearchParams(location.hash.slice(1));
     toast('Google sign-in: '+(q.get('error_description')||q.get('error')||'failed').replace(/\+/g,' '));
     history.replaceState(null,'',location.pathname); }
   return; }
 const q=new URLSearchParams(location.hash.slice(1));
 const at=q.get('access_token'); history.replaceState(null,'',location.pathname);
 if(!at) return;
 const pay=JSON.parse(atob(at.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
 const email=(pay.email||'').toLowerCase(); if(!email) return;
 const md=pay.user_metadata||{};
 const name=md.full_name||md.name||email.split('@')[0];
 state.profile={name,email}; state.name=name;
 loadUserSpace(); persist();
 logEvent({event:'sign-in',name,email,when_iso:new Date().toISOString(),home_region:state.home||'',device:'google-oauth'});
 toast('Welcome, '+name+' \uD83E\uDD19 \u2014 signed in with Google'); fkWelcome(email,name);
 if(email===FK_FOUNDER) setTimeout(fkFounder,800);
 render(); }catch(e){} }

 <div class="card fadein"><h3 style="margin-bottom:6px">Location</h3>

 <div class="card fadein"><h3 style="margin-bottom:6px">Home region</h3>

      ${Object.entries(stateName).map(([k,v])=>`<option value="${k}" ${state.home===k?'selected':''}>${v}</option>`).join('')}</select>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-forest btn-sm" onclick="state.home=$('#setHome').value;persist();render();toast('Region saved')">Save region</button>
      <button class="fbtn ${state.autoRegion?'on':''}" onclick="state.autoRegion=!state.autoRegion;store.set('autoRegion',state.autoRegion);if(state.autoRegion)fkAutoRegion(true);render()">Auto by location ${state.autoRegion?'\u2713':''}</button></div></div></div>
 <div class="card fadein"><h3 style="margin-bottom:6px">Privacy</h3>
   <div class="sub">Hide your email address across the app UI (crew links still work).</div>
   <button class="fbtn ${state.hideEmail?'on':''}" style="margin-top:10px" onclick="state.hideEmail=!state.hideEmail;store.set('hideEmail',state.hideEmail);render()">Hide my email ${state.hideEmail?'\u2713':''}</button></div>
 ${state.profile?`<div class="card fadein"><h3 style="margin-bottom:6px">Account</h3>
   <div class="sub" style="overflow-wrap:anywhere">${esc(state.profile.name)} \u00B7 ${fkEmailStr(state.profile.email)}</div>
   <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="state.profile=null;loadUserSpace();persist();go('profile');toast('Signed out')">Sign out</button></div>`:''}`;
}
function fkAutoRegion(force){ if(!state.autoRegion&&!force) return; if(!state.geo) return;
 let best=null,bd=1e9;
 WAVES.forEach(w=>{ if(w.locked||w.lat==null) return;
  const d=dist(state.geo.lat,state.geo.lon,w.lat,w.lon); if(d<bd){bd=d;best=w;} });
 if(best&&best.st&&state.home!==best.st){ state.home=best.st; persist();
  toast('\uD83C\uDF32 Home region set to '+(stateName[best.st]||best.st)+' (auto)'); render(); } }

/* ---- avatars ---- */
state.avC=state.avC||{};
async function fkHash(em){ if(state.avC[em]) return state.avC[em];
 const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('fs-av:'+em));
 const h=[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('').slice(0,24);
 state.avC[em]=h; return h; }
function fkAvURL(h){ return SB_URL+'/storage/v1/object/public/wave-media/avatars/'+h+'.jpg'; }
function fkAv(em,size){ const nm=fkPeerName(em)||'?';
 return `<span class="fkav" data-fkav="${esc(em)}" style="width:${size}px;height:${size}px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;background:var(--panel2);border:1px solid var(--steel);color:var(--mint);font-size:${Math.round(size*0.42)}px;overflow:hidden;background-size:cover;background-position:center">${esc(nm[0].toUpperCase())}</span>`; }
async function fkAvPaint(){ const els=document.querySelectorAll('[data-fkav]');
 for(const el of els){ const em=el.getAttribute('data-fkav'); if(!em) continue;
  const h=await fkHash(em); const url=fkAvURL(h)+((state.avBust&&state.profile&&em===state.profile.email)?'?v='+state.avBust:'');
  const img=new Image();
  img.onload=()=>{ el.style.backgroundImage='url("'+url+'")'; el.textContent=''; };
  img.src=url; } }
function fkAvatarPick(){ if(!state.profile){ toast('Sign in first'); return; }
 let inp=document.getElementById('fkAvFile');
 if(!inp){ inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.id='fkAvFile'; inp.style.display='none'; document.body.appendChild(inp); }
 inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; inp.value=''; if(!f) return;
  toast('Uploading photo\u2026');
  try{
   const url=URL.createObjectURL(f); const img=new Image();
   await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=url; });
   const c=document.createElement('canvas'); c.width=256; c.height=256;
   const s=Math.min(img.width,img.height);
   c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,256,256);
   URL.revokeObjectURL(url);
   const blob=await new Promise(r=>c.toBlob(r,'image/jpeg',0.85));
   const h=await fkHash(state.profile.email);
   const up=await fetch(SB_URL+'/storage/v1/object/wave-media/avatars/'+h+'.jpg',{method:'POST',
    headers:{apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
   if(!up.ok) throw new Error('storage '+up.status);
   state.avBust=Date.now(); fkLog('avatar_set','profile');
   toast('\u2713 Photo set'); render();
  }catch(e){ toast('Photo upload failed \u2014 '+e.message); } };
 inp.click(); }

/* ---- find yer crew ---- */
function fkFindCrew(){ if(!state.profile){ toast('Sign in (Profile) to find crew'); return; }
 const panel=$('#sheetPanel'); if(!panel) return;
 panel.innerHTML=`<div class="grab"></div><div class="sheet-body" style="padding-bottom:26px">
  <h3 style="margin:14px 0 4px">\uD83D\uDD0E Find yer crew</h3>
  <div class="sub" style="margin-bottom:10px">Search FlowState members by name or email.</div>
  <input id="fkFindQ" placeholder="Name or email\u2026" autocomplete="off">
  <div id="fkFindOut" style="margin-top:10px"><span class="tiny">Type at least 2 characters.</span></div>
  <div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ghost" onclick="closeSheet()">Close</button></div></div>`;
 $('#sheet').classList.add('open');
 const q=document.getElementById('fkFindQ'); let tmr=null;
 q.addEventListener('input',()=>{ clearTimeout(tmr); tmr=setTimeout(fkFindRun,350); });
 setTimeout(()=>q.focus(),300); }
async function fkFindRun(){ const q=document.getElementById('fkFindQ'); const out=document.getElementById('fkFindOut');
 if(!q||!out) return; const v=q.value.trim(); if(v.length<2){ out.innerHTML='<span class="tiny">Type at least 2 characters.</span>'; return; }
 out.innerHTML='<span class="tiny">Searching\u2026</span>';
 const r=await fkDM({action:'find',q:v});
 if(!r||!Array.isArray(r.users)){ out.innerHTML='<span class="tiny">Search unavailable \u2014 try again.</span>'; return; }
 if(!r.users.length){ out.innerHTML='<span class="tiny">No members match \u2014 invite them with your Crew QR.</span>'; return; }
 out.innerHTML=r.users.map(u=>{ const have=(state.crew||[]).some(c=>c.email===u.email);
  return `<div class="kv"><span class="k" style="display:flex;align-items:center;gap:8px">${fkAv(u.email,26)} ${esc(u.name)}</span>
   <span class="v">${have?'<span class="tiny">in your crew \u2713</span>':`<button class="btn btn-ghost btn-sm" onclick="fkFindAdd('${u.email}','${esc(u.name).replace(/'/g,'')}')">+ Add</button>`}</span></div>`; }).join('');
 fkAvPaint(); }
function fkFindAdd(em,nm){ if((state.crew||[]).some(c=>c.email===em)){ toast('Already in your crew'); return; }
 state.crew.push({name:nm||em.split('@')[0],email:em}); persist();
 fkLog('crew_add','find'); fkMissionCheck(); toast('\uD83E\uDD1D '+nm+' added to your crew'); fkFindRun(); }

/* ---- journal editing ---- */
function editSession(i){ const s=state.journal[i]; if(!s){ toast('Entry not found'); return; }
 state.jEdit=i; jDraft.mood=s.mood||null; jDraft.pic=s.pic||null;
 if(state.tab!=='journal') go('journal'); else render();
 const fill=()=>{ const sp=$('#jSpot'); if(!sp) return false;
  sp.value=String(s.spot);
  $('#jWaves').value=s.waves||''; $('#jLong').value=s.longest||''; $('#jNotes').value=s.notes||'';
  document.querySelectorAll('#moodRow .mood').forEach(x=>x.classList.toggle('on',x.dataset.m===s.mood));
  const st=$('#jPicState'); if(st) st.textContent=s.pic?'photo attached \u2713':'';
  const form=sp.closest('.card'); if(form){ form.style.borderColor='var(--brass)'; form.scrollIntoView({block:'start'}); }
  return true; };
 requestAnimationFrame(()=>{ if(!fill()) setTimeout(fill,250); });
 toast('\u270F\uFE0F Editing \u2014 change anything, then hit Update session'); }
function fkJPhoto(){ if(!state.profile){ toast('Sign in first'); return; }
 let inp=document.getElementById('fkJPicFile');
 if(!inp){ inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.id='fkJPicFile'; inp.style.display='none'; document.body.appendChild(inp); }
 inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; inp.value=''; if(!f) return;
  toast('Uploading photo\u2026');
  try{ const blob=await fkMediaShrink(f);
   const path='journal/'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.jpg';

    headers:{apikey:SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':blob.type||'image/jpeg'},body:blob});
   if(!up.ok) throw new Error('storage '+up.status);
   jDraft.pic=path; const st=$('#jPicState'); if(st) st.textContent='photo attached \u2713';
   toast('\u2713 Photo ready \u2014 it saves with the entry'); fkLog('journal_photo','journal');
  }catch(e){ toast('Photo failed \u2014 '+e.message); } };
 inp.click(); }
function fkEmailStr(em){ return state.hideEmail? '\u2022\u2022\u2022\u2022\u2022@\u2022\u2022\u2022' : esc(em); }
/* card extractor: pulls a whole .card div containing a marker */
function fkExtractCard(html,marker){ const mi=html.indexOf(marker); if(mi<0) return [html,''];
 const start=html.lastIndexOf('<div class="card',mi); if(start<0) return [html,''];
 let d=0,i=start;
 while(i<html.length){ const o=html.indexOf('<div',i), c=html.indexOf('</div>',i);
  if(c<0) break;
  if(o>=0&&o<c){ d++; i=o+4; } else { d--; i=c+6; if(d===0) return [html.slice(0,start)+html.slice(i), html.slice(start,i)]; } }
 return [html,'']; }
function fkFooter(){ return `<div class="section-note" style="text-align:center;margin-top:30px">${APP_VER} \u00B7 ${WAVES.filter(w=>!w.locked).length} waves \u00B7 Live data \u00A9 USGS (provisional), USBR, EC & Open-Meteo<br>Predictions are trend estimates \u2014 always scout. Rivers change.</div>`; }
const _fk_render2=render; render=function(){ _fk_render2();
 if(state.live&&state.live['14070500']) delete state.live['14070500'].stage;
 const m=$('#main'); if(m&&!m.querySelector('[data-fkfooter]')) m.insertAdjacentHTML('beforeend','<div data-fkfooter>'+fkFooter()+'</div>');
 setTimeout(fkAvPaint,60); fkDMBadge(); };

fkLoad();
fkFetchStatus().then(()=>render());
setInterval(fkFetchStatus, 15*60*1000);
Object.keys(state.fin.secrets||{}).forEach(r=>fkTryRegion(r));
fkFlushPending();
if(state.geo){ fkProximity(state.geo.lat,state.geo.lon,true); fkAutoRegion(); }
if(state.profile&&state.profile.email===FK_FOUNDER) setTimeout(fkFounder,1200);
state.autoRegion=store.get('autoRegion',true);
state.hideEmail=store.get('hideEmail',false);
state.alerts=(state.alerts||[]).filter(a=>a&&a.t&&(Date.now()-a.t)<24*3600e3);
fkAuthHash();
setTimeout(fkCrewParam,400);
setTimeout(fkDMPoll,2500); setInterval(fkDMPoll,90000);
render();
