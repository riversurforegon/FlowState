    curlAnimate('curl-sheet', s.open?0.95:0.15, 0.55); return; }
  if(!w.gid){ const el=$('#sheetPred'); if(el) el.innerHTML='<span class="tiny">No gauge is linked to this wave yet — predictions unavailable. Local knowledge and eyes on the water are your gauge here.</span>'; drawHydro(w,null); curlAnimate('curl-sheet',null,0.55); return; }
  if(!state.live[w.gid]) await fetchCurrent([w.gid]);
  if(!state.series[w.gid]) await fetchSeries(w.gid);
  const p=predict(w); const el=$('#sheetPred');
  if(el) el.innerHTML = p? predText(w,p) : '<span class="tiny">Not enough recent gauge data to compute a trend.</span>';
  drawHydro(w, state.series[w.gid]);
  curlAnimate('curl-sheet', fillLevel(w), 0.55);
}
function drawHydro(w, series){
  const cv=$('#hydro'); if(!cv) return; const note=$('#hydroNote');
  const dpr=window.devicePixelRatio||1; const cw=cv.clientWidth||360, ch=170;
  cv.width=cw*dpr; cv.height=ch*dpr; const g=cv.getContext('2d'); g.scale(dpr,dpr);
  g.clearRect(0,0,cw,ch);
  const useStage=(w.fmin==null&&w.fmax==null&&w.fopt==null)&&(w.smin!=null||w.smax!=null);
  const pts=(series||[]).filter(p=>p.param===(useStage?'00065':'00060'));
  if(!pts.length){ g.fillStyle='#7E938B'; g.font='13px sans-serif'; g.textAlign='center'; g.fillText('No recent gauge series available',cw/2,ch/2); if(note)note.textContent=''; return; }
  const t0=pts[0].t, t1=pts[pts.length-1].t + (t1_ext=>0)(0);
  const p=predict(w); const ext = p&&p.eta? Math.min(p.eta,96)*3.6e6 : 0;
  const tmax=pts[pts.length-1].t+ext;
  const lo=useStage?w.smin:(w.fmin!=null?w.fmin:(w.fopt?w.fopt*0.75:null));
  const hi=useStage?w.smax:(w.fmax!=null?w.fmax:(w.fopt?w.fopt*1.35:null));
  let vmin=Math.min(...pts.map(p=>p.v)), vmax=Math.max(...pts.map(p=>p.v));
  if(lo!=null){vmin=Math.min(vmin,lo);vmax=Math.max(vmax,lo);} if(hi!=null){vmin=Math.min(vmin,hi);vmax=Math.max(vmax,hi);}
  const pad=(vmax-vmin)*0.15||1; vmin-=pad; vmax+=pad;
  const X=t=>28+(t-t0)/(tmax-t0)*(cw-40), Y=v=>10+(1-(v-vmin)/(vmax-vmin))*(ch-38);
  // band
  if(lo!=null||hi!=null){ const yTop=Y(hi!=null?hi:vmax), yBot=Y(lo!=null?lo:vmin);
    g.fillStyle='rgba(95,143,134,.18)'; g.fillRect(28,yTop,cw-40,yBot-yTop);
    g.strokeStyle='rgba(159,217,198,.45)'; g.setLineDash([4,4]); g.beginPath();
    if(hi!=null){g.moveTo(28,yTop);g.lineTo(cw-12,yTop);} if(lo!=null){g.moveTo(28,yBot);g.lineTo(cw-12,yBot);} g.stroke(); g.setLineDash([]); }
  // area+line
  g.beginPath(); pts.forEach((pp,i)=>{ const x=X(pp.t),y=Y(pp.v); i?g.lineTo(x,y):g.moveTo(x,y); });
  g.strokeStyle='#9FD9C6'; g.lineWidth=2.2; g.lineJoin='round'; g.stroke();
  g.lineTo(X(pts[pts.length-1].t),ch-28); g.lineTo(X(t0),ch-28); g.closePath();
  const grad=g.createLinearGradient(0,0,0,ch); grad.addColorStop(0,'rgba(95,143,134,.35)'); grad.addColorStop(1,'rgba(95,143,134,.04)');
  g.fillStyle=grad; g.fill();
  // trend extension
  if(p&&ext>0){ const last=pts[pts.length-1];
    g.beginPath(); g.moveTo(X(last.t),Y(last.v)); g.lineTo(X(last.t+ext),Y(last.v+p.slope*(ext/3.6e6)));
    g.strokeStyle='rgba(168,144,92,.95)'; g.setLineDash([6,5]); g.lineWidth=2; g.stroke(); g.setLineDash([]); }
  // now dot
  const last=pts[pts.length-1];
  g.beginPath(); g.arc(X(last.t),Y(last.v),4.5,0,7); g.fillStyle='#9FD9C6'; g.fill();
  g.beginPath(); g.arc(X(last.t),Y(last.v),8,0,7); g.strokeStyle='rgba(159,217,198,.3)'; g.stroke();
  // labels
  g.fillStyle='#7E938B'; g.font='10.5px sans-serif'; g.textAlign='left';
  g.fillText((useStage?vmax.toFixed(1)+' ft':Math.round(vmax).toLocaleString()),4,16);
  g.fillText((useStage?vmin.toFixed(1)+' ft':Math.round(vmin).toLocaleString()),4,ch-30);
  g.textAlign='center';
  for(let d=0;d<=7;d+=2){ const t=t0+d*864e5; if(t>tmax)break; g.fillText(new Date(t).toLocaleDateString(undefined,{weekday:'short'}),X(t),ch-14); }
  if(note) note.textContent=`Latest: ${useStage? last.v+' ft':fmtFlow(last.v)} at ${new Date(last.t).toLocaleString(undefined,{weekday:'short',hour:'numeric',minute:'2-digit'})} · USGS provisional data`;
}

  const longest=j.reduce((a,s)=>Math.max(a,+s.longest||0),0);
  return `
  ${backBtn()}
  <div class="fadein" style="margin:8px 2px 14px"><h1>Journal</h1><div class="sub">Every session is a conversation with the river.</div></div>
  <div class="statrow fadein" style="margin-bottom:16px">
    <div class="stat"><b>${j.length}</b><span>sessions</span></div>
    <div class="stat"><b>${waves}</b><span>waves ridden</span></div>
    <div class="stat"><b>${longest?longest+'s':'—'}</b><span>longest ride</span></div>
  </div>
  ${state.profile?'':'<div class="card fadein"><div class="sub">Sign in on the <b>Profile</b> page to log sessions and edit your journal. Entries are tied to your email.</div></div>'}
  <div class="card fadein">
    <h3 style="margin-bottom:10px">Log a session${state.profile?` — ${esc(state.profile.name)}`:''}</h3>
    <div style="display:grid;gap:10px">
      <select id="jSpot">${WAVES.map(w=>`<option value="${w.id}" ${state.selected===w.id?'selected':''}>${esc(w.name)} — ${esc(w.river||w.st||'')}</option>`).join('')}</select>
      <div style="display:flex;gap:10px">
        <input id="jWaves" type="number" min="0" placeholder="Wave count">
        <input id="jLong" type="number" min="0" placeholder="Longest ride (s)">
      </div>
      <div class="moodrow" id="moodRow">
        ${['Flowing','Stoked','Mellow','Humbled'].map(m=>`<button class="mood" data-m="${m}">${m}</button>`).join('')}
      </div>
      <textarea id="jNotes" rows="2" placeholder="Conditions, board, the moment the light hit the water…"></textarea>
      <button class="btn btn-forest" onclick="saveSession()">Save session</button>
    </div>
  </div>
  <h2 class="fadein">Past sessions</h2>
  ${j.length? j.map((s,i)=>{ const w=WAVES[s.spot];
    return `<div class="card fadein" style="padding:15px 18px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <h3>${esc(w?w.name:'Unknown wave')}</h3><span class="tiny">${new Date(s.t).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span></div>
      <div class="tiny" style="margin:3px 0">${esc(w?w.river||'':'')}${s.flow?` · ${esc(s.flow)}`:''}${s.mood?` · feeling ${s.mood.toLowerCase()}`:''}${s.owner?` · ${esc(s.owner)}`:''}${s.auto?' · auto':''}</div>
      <div class="sub">${s.waves?`${s.waves} waves`:''}${s.longest?` · longest ${s.longest}s`:''}${s.notes?` — ${esc(s.notes)}`:''}</div>
      ${(!s.owner || (state.profile && s.owner===state.profile.email))? `<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="state.journal.splice(${i},1);persist();render()">Remove</button>` : `<div class="tiny" style="margin-top:8px;color:var(--rivet)">🔒 ${esc(s.owner.split('@')[0])}'s entry</div>`}
    </div>`; }).join('')
   : `<div class="card fadein"><div class="sub">No sessions yet. The first entry is always the sweetest — go get wet, then tell the story here.</div></div>`}`;
}
function bindJournalMoods(){ document.querySelectorAll('#moodRow .mood').forEach(b=>b.onclick=()=>{ jDraft.mood=b.dataset.m; document.querySelectorAll('#moodRow .mood').forEach(x=>x.classList.toggle('on',x===b)); }); }
function saveSession(){
  if(!state.profile){ toast('Sign in first — Profile page'); go('profile'); return; }
  const spot=+$('#jSpot').value; const w=WAVES[spot];
  const lv=w&&w.gid?state.live[w.gid]:null;
  state.journal.unshift({ t:Date.now(), spot, waves:$('#jWaves').value, longest:$('#jLong').value,
    mood:jDraft.mood, notes:$('#jNotes').value.trim(), flow: lv&&lv.flow!=null? fmtFlow(lv.flow):null, owner: state.profile.email });
  persist(); jDraft.mood=null; toast('Session saved — nice work out there 🤙'); render();
}
function logFromSpot(id){ state.selected=id; persist(); closeSheet(); go('journal'); }

/* ---------- PROFILE ---------- */
function viewProfile(){
  const notifState = typeof Notification==='undefined'?'unsupported':Notification.permission;
  return `
  ${backBtn()}
  <div class="fadein" style="margin:8px 2px 14px"><h1>Profile</h1><div class="sub">Tune FlowState to your watershed.</div></div>
  ${state.profile? `
  <div class="card fadein">
    <h3 style="margin-bottom:8px">Signed in</h3>
    <div class="sub">${esc(state.profile.name)} · ${esc(state.profile.email)}</div>
    <div style="display:grid;gap:10px;margin-top:12px">
      <select id="pHome"><option value="">Home region…</option>
        ${Object.entries(stateName).map(([k,v])=>`<option value="${k}" ${state.home===k?'selected':''}>${v}</option>`).join('')}</select>
      <div style="display:flex;gap:8px">
        <button class="btn btn-forest btn-sm" onclick="state.home=$('#pHome').value;persist();toast('Saved')">Save</button>
        <button class="btn btn-ghost btn-sm" onclick="state.profile=null;loadUserSpace();persist();render();toast('Signed out')">Sign out</button>
      </div>
    </div>
  </div>
  <div class="card fadein">
    <h3 style="margin-bottom:8px">Crew</h3>
    <div class="sub">Connect with other surfers by email. Message opens your mail app — real-time in-app chat needs a hosted backend.</div>
    <div style="display:grid;gap:8px;margin-top:12px">
      <input id="cName" placeholder="Name">
      <input id="cEmail" placeholder="email@…">
      <button class="btn btn-ghost btn-sm" onclick="addCrew()">+ Connect</button>
    </div>
    ${state.crew.map((c,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px;border-top:1px solid rgba(85,100,92,.3);padding-top:10px">
      <div><div style="font-size:12px;color:var(--canvas);letter-spacing:.05em">${esc(c.name)}</div><div class="tiny">${esc(c.email)}</div></div>
      <div style="display:flex;gap:6px;flex:none">
        <a class="btn btn-ghost btn-sm" style="text-decoration:none" href="mailto:${esc(c.email)}?subject=FlowState%20—%20wave%20check&body=Via%20con%20dios%20—%20the%20wave%20is%20in.">Message</a>
        <button class="btn btn-sm" onclick="state.crew.splice(${i},1);persist();render()">✕</button></div></div>`).join('')}
  </div>` : `
  <div class="card fadein">
    <h3 style="margin-bottom:8px">Sign in</h3>
    <div class="sub">Create a profile with your email — your journal, check-ins and crew are tied to it. By signing in, your name and email are shared with FlowState. Profile data otherwise stays on this device.</div>
    <div style="display:grid;gap:10px;margin-top:12px">
      <input id="pName" placeholder="Your name" value="${esc(state.name)}">
      <input id="pEmail" placeholder="you@email.com" type="email">
      <button class="btn btn-forest btn-sm" onclick="signIn()">Sign in</button>
    </div>
  </div>`}
  <div class="card fadein">
    <h3 style="margin-bottom:10px">Units</h3>
    <div style="display:flex;gap:10px">
      <button class="fbtn ${state.units==='cfs'?'on':''}" onclick="state.units='cfs';persist();render()">cfs · °F</button>
      <button class="fbtn ${state.units==='cms'?'on':''}" onclick="state.units='cms';persist();render()">m³/s · °C</button>
    </div>
  </div>
  <div class="card fadein">
    <h3 style="margin-bottom:6px">Notifications</h3>
    <div class="sub">Watching <b>${state.subs.size}</b> wave${state.subs.size===1?'':'s'} · browser permission: <b>${notifState}</b>.<br>
    FlowState checks your watched gauges every 10 minutes while open and alerts you when a wave turns on, starts priming, or is projected to come in.</div>
    ${notifState==='default'?`<button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="Notification.requestPermission().then(()=>render())">Enable browser notifications</button>`:''}
  </div>
  <div class="card fadein">
    <h3 style="margin-bottom:6px">Location</h3>
    <div class="sub">Share location to sort Explore by distance to the water.</div>
    <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="askGeo()">${state.geo?'Location on ✓':'Use my location'}</button>
  </div>
  <div class="card fadein">
    <h3 style="margin-bottom:6px">Conservation ledger</h3>
    <div class="statrow" style="margin-top:8px">
      <div class="stat"><b>${state.cleanups}</b><span>cleanups</span></div>
      <div class="stat"><b>${state.journal.length}</b><span>sessions</span></div>
      <div class="stat"><b>${state.favs.size}</b><span>home waters</span></div>
    </div>
    <div class="sub" style="margin-top:10px">Partners worth your time: American Whitewater · Waterkeeper Alliance · your local watershed council. Gauges are public infrastructure — support USGS streamgage funding.</div>
  </div>
  <div class="section-note" style="text-align:center">
    ${APP_VER} · wave database: 125 spots, 96 verified USGS gauges (built July 2026)<br>
    Live data © USGS (provisional) & Open-Meteo · Predictions are statistical trends, not official forecasts.<br>
    Rivers are dynamic and dangerous. Scout every feature. Wear a PFD where appropriate. Never surf alone.
  </div>`;
}
function askGeo(){ if(!navigator.geolocation){toast('Geolocation unavailable');return;}
  navigator.geolocation.getCurrentPosition(p=>{ state.geo={lat:p.coords.latitude,lon:p.coords.longitude}; toast('Location set — Explore now sorts by distance'); render(); },()=>toast('Location permission denied')); }

/* ============ BOOT ============ */
document.addEventListener('click',e=>{ if(!e.target.closest('#menuBtn') && !e.target.closest('#menuDrop')) closeMenu(); });
const _origRender=render;
render=function(){ _origRender(); if(state.tab==='journal') bindJournalMoods(); };
go('forecast');
refreshLive(true).then(()=>{ render(); const f=featuredWave(); if(f.gid) fetchSeries(f.gid).then(()=>{ if(state.tab==='forecast') hydrateForecast(); }); });
setInterval(()=>refreshLive(false).then(()=>{ if(state.tab==='forecast') render(); }), 10*60*1000);
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
